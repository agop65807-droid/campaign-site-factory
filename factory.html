<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم المصنع — Campaign Site Factory</title>
  <meta name="robots" content="noindex, nofollow">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'Cairo', 'sans-serif'] },
          colors: {
            factory: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d' },
            slate: { 850:'#172033',950:'#0b1120' }
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', 'Cairo', sans-serif; }
    .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
    .glass-strong { background: rgba(255,255,255,0.07); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); }
    .glow { box-shadow: 0 0 40px rgba(22,163,74,0.15); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #166534; border-radius: 3px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.4s ease-out forwards; }
    @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin-slow { animation: spin-slow 2s linear infinite; }
    .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; }
    .input-field:focus { outline: none; border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.15); }
    .color-swatch { width:36px; height:36px; border-radius:10px; cursor:pointer; border:2px solid transparent; transition:all 0.2s; }
    .color-swatch:hover { transform:scale(1.1); }
    .color-swatch.active { border-color:#fff; box-shadow:0 0 0 3px rgba(34,197,94,0.5); }
    .toast { animation: fadeUp 0.3s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen" x-data="factoryApp()" x-init="init()">

  <!-- Loading -->
  <template x-if="loading && !authorized">
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950">
      <div class="text-center">
        <div class="w-12 h-12 border-3 border-factory-500 border-t-transparent rounded-full spin-slow mx-auto mb-4"></div>
        <p class="text-sm text-gray-400">جاري التحقق...</p>
      </div>
    </div>
  </template>

  <!-- Login Screen -->
  <template x-if="!loading && !authorized">
    <div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
      <div class="glass-strong rounded-3xl p-8 w-full max-w-md fade-up">
        <div class="text-center mb-8">
          <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-factory-500 to-factory-700 flex items-center justify-center mx-auto mb-4 glow">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
          </div>
          <h1 class="text-2xl font-black text-white">لوحة تحكم المصنع</h1>
          <p class="text-sm text-gray-400 mt-1">Campaign Site Factory — Super Admin</p>
        </div>
        <form @submit.prevent="login()" class="space-y-4">
          <div>
            <label class="text-xs font-semibold text-gray-400 mb-1.5 block">اسم المستخدم</label>
            <input type="text" x-model="loginForm.username" class="input-field w-full rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500" placeholder="admin" required>
          </div>
          <div>
            <label class="text-xs font-semibold text-gray-400 mb-1.5 block">كلمة المرور</label>
            <input type="password" x-model="loginForm.password" class="input-field w-full rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500" placeholder="••••••••" required>
          </div>
          <template x-if="loginError">
            <p class="text-xs text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2" x-text="loginError"></p>
          </template>
          <button type="submit" :disabled="loginLoading" class="w-full py-3 rounded-xl bg-gradient-to-r from-factory-600 to-factory-500 hover:from-factory-500 hover:to-factory-400 text-white font-bold text-sm transition-all duration-300 disabled:opacity-50 flex items-center justify-center gap-2">
            <div x-show="loginLoading" class="w-4 h-4 border-2 border-white border-t-transparent rounded-full spin-slow"></div>
            <span x-text="loginLoading ? 'جاري الدخول...' : 'تسجيل الدخول'"></span>
          </button>
        </form>
      </div>
    </div>
  </template>

  <!-- Main Dashboard -->
  <template x-if="authorized">
    <div class="min-h-screen flex">
      <!-- Sidebar -->
      <aside class="w-64 glass border-l border-white/5 flex flex-col fixed h-full z-30">
        <div class="p-5 border-b border-white/5">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-factory-500 to-factory-700 flex items-center justify-center">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
            </div>
            <div>
              <h2 class="text-sm font-bold text-white">المصنع</h2>
              <p class="text-[10px] text-gray-500">Campaign Site Factory</p>
            </div>
          </div>
        </div>
        <nav class="flex-1 p-3 space-y-1">
          <button @click="currentView='dashboard'" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all" :class="currentView==='dashboard' ? 'bg-factory-600/20 text-factory-400 font-bold' : 'text-gray-400 hover:bg-white/5 hover:text-white'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
            لوحة التحكم
          </button>
          <button @click="currentView='tenants'; loadTenants()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all" :class="currentView==='tenants' ? 'bg-factory-600/20 text-factory-400 font-bold' : 'text-gray-400 hover:bg-white/5 hover:text-white'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            الجهات
            <span class="mr-auto bg-factory-600/30 text-factory-400 text-[10px] px-2 py-0.5 rounded-full font-bold" x-text="tenants.length"></span>
          </button>
          <button @click="currentView='create'; resetCreateForm()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all" :class="currentView==='create' ? 'bg-factory-600/20 text-factory-400 font-bold' : 'text-gray-400 hover:bg-white/5 hover:text-white'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
            إنشاء موقع جديد
          </button>
          <button @click="currentView='logs'; loadLogs()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all" :class="currentView==='logs' ? 'bg-factory-600/20 text-factory-400 font-bold' : 'text-gray-400 hover:bg-white/5 hover:text-white'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            سجل الأنشطة
          </button>
        </nav>
        <div class="p-3 border-t border-white/5">
          <button @click="logout()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-400 hover:bg-red-500/10 hover:text-red-400 transition-all">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            خروج
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 mr-64 p-6">
        <!-- ===== DASHBOARD VIEW ===== -->
        <div x-show="currentView==='dashboard'" class="fade-up">
          <div class="mb-6">
            <h1 class="text-2xl font-black text-white">لوحة التحكم</h1>
            <p class="text-sm text-gray-400 mt-1">نظرة عامة على المصنع والمواقع المُنشأة</p>
          </div>

          <!-- Stats Cards -->
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="glass rounded-2xl p-5">
              <div class="flex items-center justify-between mb-3">
                <span class="text-xs text-gray-400">إجمالي الجهات</span>
                <div class="w-8 h-8 rounded-lg bg-factory-500/20 flex items-center justify-center"><svg class="w-4 h-4 text-factory-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
              </div>
              <div class="text-3xl font-black text-white" x-text="tenants.length"></div>
            </div>
            <div class="glass rounded-2xl p-5">
              <div class="flex items-center justify-between mb-3">
                <span class="text-xs text-gray-400">نشطة</span>
                <div class="w-8 h-8 rounded-lg bg-green-500/20 flex items-center justify-center"><span class="w-2.5 h-2.5 bg-green-400 rounded-full pulse-dot"></span></div>
              </div>
              <div class="text-3xl font-black text-green-400" x-text="tenants.filter(t=>t.status==='active').length"></div>
            </div>
            <div class="glass rounded-2xl p-5">
              <div class="flex items-center justify-between mb-3">
                <span class="text-xs text-gray-400">قيد الإنشاء</span>
                <div class="w-8 h-8 rounded-lg bg-yellow-500/20 flex items-center justify-center"><div class="w-3 h-3 border-2 border-yellow-400 border-t-transparent rounded-full spin-slow"></div></div>
              </div>
              <div class="text-3xl font-black text-yellow-400" x-text="tenants.filter(t=>t.status==='creating').length"></div>
            </div>
            <div class="glass rounded-2xl p-5">
              <div class="flex items-center justify-between mb-3">
                <span class="text-xs text-gray-400">معطلة / فاشلة</span>
                <div class="w-8 h-8 rounded-lg bg-red-500/20 flex items-center justify-center"><svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg></div>
              </div>
              <div class="text-3xl font-black text-red-400" x-text="tenants.filter(t=>t.status==='suspended'||t.status==='failed').length"></div>
            </div>
          </div>

          <!-- Recent Tenants -->
          <div class="glass rounded-2xl overflow-hidden">
            <div class="px-5 py-4 border-b border-white/5 flex items-center justify-between">
              <h2 class="text-sm font-bold text-white">آخر الجهات المُنشأة</h2>
              <button @click="currentView='tenants'; loadTenants()" class="text-xs text-factory-400 hover:text-factory-300 transition-colors">عرض الكل</button>
            </div>
            <div x-show="tenants.length === 0" class="p-10 text-center">
              <svg class="w-12 h-12 mx-auto mb-3 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
              <p class="text-sm text-gray-400">لا توجد جهات بعد</p>
              <button @click="currentView='create'; resetCreateForm()" class="mt-3 text-xs text-factory-400 hover:text-factory-300 font-bold">+ إنشاء أول موقع</button>
            </div>
            <div x-show="tenants.length > 0" class="divide-y divide-white/5">
              <template x-for="t in tenants.slice(0,5)" :key="t.id">
                <div @click="viewTenant(t)" class="flex items-center gap-4 px-5 py-4 hover:bg-white/3 cursor-pointer transition-colors">
                  <div class="w-10 h-10 rounded-xl flex items-center justify-center text-sm font-bold" :style="'background:'+t.primary_color+'20; color:'+t.primary_color" x-text="t.org_name.charAt(0)"></div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-bold text-white truncate" x-text="t.org_name"></p>
                    <p class="text-xs text-gray-500" x-text="t.slug + '.vercel.app'"></p>
                  </div>
                  <span class="px-2.5 py-1 rounded-full text-[10px] font-bold" :class="{
                    'bg-green-500/20 text-green-400': t.status==='active',
                    'bg-yellow-500/20 text-yellow-400': t.status==='creating',
                    'bg-red-500/20 text-red-400': t.status==='failed'||t.status==='suspended',
                    'bg-gray-500/20 text-gray-400': t.status==='deleting'
                  }" x-text="statusLabel(t.status)"></span>
                  <span class="text-xs text-gray-500" x-text="formatDate(t.created_at)"></span>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- ===== TENANTS LIST VIEW ===== -->
        <div x-show="currentView==='tenants'" class="fade-up">
          <div class="flex items-center justify-between mb-6">
            <div>
              <h1 class="text-2xl font-black text-white">الجهات</h1>
              <p class="text-sm text-gray-400 mt-1">جميع المواقع المُنشأة عبر المصنع</p>
            </div>
            <button @click="currentView='create'; resetCreateForm()" class="px-4 py-2.5 rounded-xl bg-factory-600 hover:bg-factory-500 text-white text-sm font-bold transition-all flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
              إنشاء موقع جديد
            </button>
          </div>

          <div x-show="tenants.length === 0" class="glass rounded-2xl p-10 text-center">
            <p class="text-gray-400 text-sm">لا توجد جهات مُنشأة بعد.</p>
          </div>

          <div class="space-y-3">
            <template x-for="t in tenants" :key="t.id">
              <div @click="viewTenant(t)" class="glass rounded-2xl p-5 hover:bg-white/3 cursor-pointer transition-all group">
                <div class="flex items-center gap-4">
                  <div class="w-12 h-12 rounded-xl flex items-center justify-center text-lg font-bold transition-transform group-hover:scale-105" :style="'background:'+t.primary_color+'20; color:'+t.primary_color" x-text="t.org_name.charAt(0)"></div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                      <h3 class="text-sm font-bold text-white" x-text="t.org_name"></h3>
                      <span class="px-2 py-0.5 rounded-full text-[10px] font-bold" :class="{
                        'bg-green-500/20 text-green-400': t.status==='active',
                        'bg-yellow-500/20 text-yellow-400': t.status==='creating',
                        'bg-red-500/20 text-red-400': t.status==='failed'||t.status==='suspended',
                        'bg-gray-500/20 text-gray-400': t.status==='deleting'
                      }" x-text="statusLabel(t.status)"></span>
                    </div>
                    <div class="flex items-center gap-4 mt-1 text-xs text-gray-500">
                      <span x-text="t.slug"></span>
                      <span x-show="t.vercel_url" x-text="t.vercel_url"></span>
                      <span x-text="formatDate(t.created_at)"></span>
                    </div>
                  </div>
                  <div class="flex items-center gap-2">
                    <a x-show="t.vercel_url && t.status==='active" :href="t.vercel_url" target="_blank" @click.stop class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-all" data-tip="فتح الموقع">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                    </a>
                    <button @click.stop="deleteTenant(t)" x-show="t.status!=='deleting'" class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-400 hover:text-red-400 hover:bg-red-500/10 transition-all" data-tip="حذف">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- ===== CREATE TENANT VIEW ===== -->
        <div x-show="currentView==='create'" class="fade-up">
          <div class="mb-6">
            <h1 class="text-2xl font-black text-white">إنشاء موقع جديد</h1>
            <p class="text-sm text-gray-400 mt-1">أدخل بيانات الجهة لإنشاء موقع حملة جديد</p>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Form -->
            <div class="lg:col-span-2 space-y-5">
              <div class="glass rounded-2xl p-6">
                <h3 class="text-sm font-bold text-white mb-4 flex items-center gap-2">
                  <svg class="w-4 h-4 text-factory-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                  بيانات الجهة
                </h3>
                <div class="space-y-4">
                  <div>
                    <label class="text-xs font-semibold text-gray-400 mb-1.5 block">اسم الجهة *</label>
                    <input type="text" x-model="createForm.orgName" class="input-field w-full rounded-xl px-4 py-3 text-sm text-white" placeholder="مثال: قناة الجزيرة">
                  </div>
                  <div>
                    <label class="text-xs font-semibold text-gray-400 mb-1.5 block">وصف مختصر</label>
                    <textarea x-model="createForm.description" class="input-field w-full rounded-xl px-4 py-3 text-sm text-white resize-none" rows="2" placeholder="وصف اختياري للجهة"></textarea>
                  </div>
                  <div>
                    <label class="text-xs font-semibold text-gray-400 mb-1.5 block">الهاشتاق الافتراضي</label>
                    <input type="text" x-model="createForm.hashtag" class="input-field w-full rounded-xl px-4 py-3 text-sm text-white" placeholder="#حملة_موحدة">
                  </div>
                </div>
              </div>

              <div class="glass rounded-2xl p-6">

  <!-- Toast -->

      'border-red-500/30': toast.type==='error'
    }">
      <div class="w-7 h-7 rounded-full flex items-center justify-center" :class="{
        'bg-factory-500/20 text-factory-400': toast.type==='success',
        'bg-red-500/20 text-red-400': toast.type==='error'
      }">
        <svg x-show="toast.type==='success'" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        <svg x-show="toast.type==='error'" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </div>
      <span class="text-sm font-semibold text-white" x-text="toast.message"></span>

  <script>
    function factoryApp() {
      return {
        loading: true,
        authorized: false,
        token: localStorage.getItem('factory_token') || null,
        currentView: 'dashboard',
        loginForm: { username: '', password: '' },
        loginError: '',
        loginLoading: false,
        showPassword: false,
        tenants: [],
        selectedTenant: null,
        tenantJobs: [],
        logs: [],
        createForm: {
          orgName: '', description: '', hashtag: '',
          primaryColor: '#15803d', secondaryColor: '#d97706',
          themeMode: 'dark', enabledPlatforms: ['x','whatsapp','facebook','telegram'],
          adminUsername: 'admin', adminPassword: ''
        },
        createLoading: false,
        toast: { show: false, message: '', type: 'success' },

        async init() {
          if (this.token) {
            try {
              const res = await this.api('/api/factory/me');
              if (res.success) { this.authorized = true; await this.loadTenants(); }
              else { this.token = null; localStorage.removeItem('factory_token'); }
            } catch { this.token = null; localStorage.removeItem('factory_token'); }
          }
          this.loading = false;
        },

        async api(path, options = {}) {
          const headers = { 'Content-Type': 'application/json' };
          if (this.token) headers['Authorization'] = 'Bearer ' + this.token;
          const res = await fetch(path, { ...options, headers: { ...headers, ...(options.headers || {}) } });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Request failed');
          return data;
        },

        async login() {
          this.loginLoading = true; this.loginError = '';
          try {
            const res = await fetch('/api/factory/auth', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.loginForm)
            });
            const data = await res.json();
            if (!res.ok || !data.success) { this.loginError = data.error || 'فشل تسجيل الدخول'; this.loginLoading = false; return; }
            this.token = data.token;
            localStorage.setItem('factory_token', data.token);
            this.authorized = true;
            this.loginLoading = false;
            await this.loadTenants();
            this.showToast('مرحباً بك في لوحة تحكم المصنع', 'success');
          } catch (e) { this.loginError = 'خطأ في الاتصال بالخادم'; this.loginLoading = false; }
        },

        logout() {
          this.token = null; this.authorized = false;
          localStorage.removeItem('factory_token');
          this.currentView = 'dashboard';
        },

        async loadTenants() {
          try {
            const res = await this.api('/api/factory/tenants');
            this.tenants = res.tenants || [];
          } catch (e) { console.error('Load tenants error:', e); }
        },

        async loadLogs() {
          try {
            const res = await this.api('/api/factory/logs?limit=100');
            this.logs = res.logs || [];
          } catch (e) { console.error('Load logs error:', e); }
        },

        resetCreateForm() {
          this.createForm = {
            orgName: '', description: '', hashtag: '',
            primaryColor: '#15803d', secondaryColor: '#d97706',
            themeMode: 'dark', enabledPlatforms: ['x','whatsapp','facebook','telegram'],
            adminUsername: 'admin', adminPassword: ''
          };
          this.createLoading = false;
        },

        togglePlatform(p) {
          const idx = this.createForm.enabledPlatforms.indexOf(p);
          if (idx > -1) this.createForm.enabledPlatforms.splice(idx, 1);
          else this.createForm.enabledPlatforms.push(p);
        },

        async createTenant() {
          if (!this.createForm.orgName || this.createForm.orgName.trim().length < 2) {
            this.showToast('اسم الجهة مطلوب (حرفين على الأقل)', 'error'); return;
          }
          this.createLoading = true;
          try {
            const res = await this.api('/api/factory/tenants', {
              method: 'POST',
              body: JSON.stringify({
                orgName: this.createForm.orgName,
                description: this.createForm.description,
                hashtag: this.createForm.hashtag,
                primaryColor: this.createForm.primaryColor,
                secondaryColor: this.createForm.secondaryColor,
                themeMode: this.createForm.themeMode,
                enabledSharePlatforms: this.createForm.enabledPlatforms
              })
            });
            if (res.success) {
              this.showToast('تم إنشاء الجهة بنجاح', 'success');
              await this.loadTenants();
              this.viewTenant(res.tenant);
            }
          } catch (e) { this.showToast('خطأ: ' + e.message, 'error'); }
          this.createLoading = false;
        },

        viewTenant(t) {
          this.selectedTenant = t;
          this.tenantJobs = [];
          this.currentView = 'detail';
          this.loadTenantDetail(t.id);
        },

        async loadTenantDetail(id) {
          try {
            const res = await this.api('/api/factory/tenants/' + id);
            if (res.success) {
              this.selectedTenant = res.tenant;
              this.tenantJobs = res.jobs || [];
            }
          } catch (e) { console.error('Load tenant detail error:', e); }
        },

        async toggleTenantStatus(status) {
          if (!this.selectedTenant) return;
          try {
            await this.api('/api/factory/tenants/' + this.selectedTenant.id, {
              method: 'PUT', body: JSON.stringify({ status })
            });
            this.showToast(status === 'suspended' ? 'تم تعليق الموقع' : 'تم إعادة تنشيط الموقع', 'success');
            await this.loadTenantDetail(this.selectedTenant.id);
            await this.loadTenants();
          } catch (e) { this.showToast('خطأ: ' + e.message, 'error'); }
        },

        async deleteTenant(t) {
          if (!t) return;
          if (!confirm('هل أنت متأكد من حذف "' + t.org_name + '"؟\n\nهذا الإجراء لا يمكن التراجع عنه!')) return;
          try {
            await this.api('/api/factory/tenants/' + t.id, { method: 'DELETE' });
            this.showToast('تم حذف الموقع', 'success');
            await this.loadTenants();
            if (this.currentView === 'detail') this.currentView = 'tenants';
          } catch (e) { this.showToast('خطأ: ' + e.message, 'error'); }
        },

        generatePassword(len = 16) {
          const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
          let pw = '';
          const arr = crypto.getRandomValues(new Uint8Array(len));
          for (let i = 0; i < len; i++) pw += chars[arr[i] % chars.length];
          return pw;
        },

        statusLabel(s) {
          return { creating: 'قيد الإنشاء', active: 'نشطة', suspended: 'معلّقة', failed: 'فاشلة', deleting: 'جاري الحذف' }[s] || s;
        },

        stepLabel(s) {
          return { init: 'بدء العملية', create_supabase: 'إنشاء مشروع Supabase', run_migration: 'تنفيذ الهجرة', create_admin: 'إنشاء الأدمن', create_vercel: 'إنشاء مشروع Vercel', set_env_vars: 'ضبط متغيرات البيئة', deploy: 'نشر الموقع', health_check: 'فحص صحي', completed: 'اكتمل', failed: 'فشل' }[s] || s;
        },

        logActionLabel(a) {
          return { login: 'دخول', create_tenant: 'إنشاء جهة', update_tenant: 'تحديث جهة', delete_tenant: 'حذف جهة', start_provisioning: 'بدء التزويد', suspend_tenant: 'تعليق' }[a] || a;
        },

        platformLabel(p) {
          return { x: 'X (تويتر)', whatsapp: 'واتساب', facebook: 'فيسبوك', telegram: 'تيليجرام' }[p] || p;
        },

        formatDate(d) {
          if (!d) return '—';
          try { return new Date(d).toLocaleString('ar-SA', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }); }
          catch { return d; }
        },

        showToast(message, type) {
          this.toast = { show: true, message, type };
          setTimeout(() => { this.toast.show = false; }, 3000);
        }
      };
    }
  </script>
</body>
</html>
