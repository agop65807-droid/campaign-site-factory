<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="السعودية سبب الفتن - الحملة الإلكترونية الموحدة. انضم إلى الحملة وشارك على X وواتساب وفيسبوك.">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="theme-color" content="#15803d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- Open Graph / Facebook / WhatsApp Rich Preview -->
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ar_AR">
  <meta property="og:site_name" :content="siteName">
  <meta property="og:title" :content="siteName + ' - الحملة الموحدة'">
  <meta property="og:description" :content="'انضم إلى الحملة الإلكترونية الموحدة وشارك على X وواتساب وفيسبوك'">
  <meta property="og:image" :content="siteLogo">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" :content="siteName">
  <meta name="twitter:description" :content="siteName + ' — الحملة الإلكترونية الموحدة'">
  <meta name="twitter:image" :content="siteLogo">
  <title x-text="siteName">السعودية سبب الفتن</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Dynamic Site Config Loader (before Tailwind) -->
  <script>
    window.__SITE_CONFIG__ = null;
    (function() {
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/config', false);
        xhr.send();
        if (xhr.status === 200) {
          window.__SITE_CONFIG__ = JSON.parse(xhr.responseText);
        }
      } catch(e) {}
    })();
  </script>

  <script>
    (function() {
      var cfg = window.__SITE_CONFIG__ || {};
      var pc = cfg.primaryColor || '#15803d';
      var sc = cfg.secondaryColor || '#d97706';
      var pcDark = pc + '33';
      var scDark = sc + '33';
      var pcLight = pc + '15';
      var scLight = sc + '15';
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              cairo: ['Cairo', 'sans-serif'],
            },
            colors: {
              yemen: {
                green: pc,
                greenLight: pc,
                greenDark: pc,
                greenPale: pcLight,
                green50: pcLight,
                red: sc,
                redLight: sc,
                redDark: sc,
                redPale: scLight,
                black: '#0a0a0a',
              },
              light: {
                bg: '#f8fafc',
                card: '#ffffff',
                border: '#e2e8f0',
                text: '#1e293b',
                muted: '#64748b',
                hover: '#f1f5f9',
              }
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'bounce-gentle': 'bounceGentle 2s ease-in-out infinite',
              'fade-in': 'fadeIn 0.8s ease-out forwards',
              'fade-out': 'fadeOut 0.6s ease-in forwards',
              'scale-in': 'scaleIn 0.6s ease-out forwards',
              'glow-green': 'glowGreen 2s ease-in-out infinite alternate',
              'glow-red': 'glowRed 2s ease-in-out infinite alternate',
              'float': 'float 6s ease-in-out infinite',
              'slide-up': 'slideUp 0.5s ease-out forwards',
              'slide-down': 'slideDown 0.4s ease-out forwards',
              'shake': 'shake 0.5s ease-in-out',
            },
            keyframes: {
              bounceGentle: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeOut: {
                '0%': { opacity: '1', transform: 'translateY(0)' },
                '100%': { opacity: '0', transform: 'translateY(-20px)' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.8)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              glowGreen: {
                '0%': { boxShadow: '0 0 20px ' + pcDark },
                '100%': { boxShadow: '0 0 40px ' + pc + '80, 0 0 60px ' + pcDark },
              },
              glowRed: {
                '0%': { boxShadow: '0 0 20px rgba(185, 28, 28, 0.4)' },
                '100%': { boxShadow: '0 0 40px rgba(185, 28, 28, 0.8), 0 0 60px rgba(185, 28, 28, 0.4)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideDown: {
                '0%': { opacity: '0', transform: 'translateY(-20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              shake: {
                '0%, 100%': { transform: 'translateX(0)' },
                '25%': { transform: 'translateX(-5px)' },
                '75%': { transform: 'translateX(5px)' },
              },
            }
          }
        }
      };
    })();
  </script>

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-bg-strong: rgba(255, 255, 255, 0.12);
      --glass-border-strong: rgba(255, 255, 255, 0.15);
      --glass-card-bg: rgba(255, 255, 255, 0.05);
      --glass-card-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(0, 0, 0, 0.3);
      --scrollbar-track: #0a0a0a;
      --pattern-opacity: 1;
    }
    html.light {
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(148, 163, 184, 0.2);
      --glass-bg-strong: rgba(255, 255, 255, 0.85);
      --glass-border-strong: rgba(148, 163, 184, 0.25);
      --glass-card-bg: rgba(255, 255, 255, 0.6);
      --glass-card-border: rgba(148, 163, 184, 0.15);
      --input-bg: rgba(241, 245, 249, 0.8);
      --scrollbar-track: #f1f5f9;
      --pattern-opacity: 0.3;
    }
    html.light body {
      background: linear-gradient(135deg, #f0fdf4 0%, #f8fafc 50%, #fef2f2 100%);
      color: #1e293b;
    }
    html.light .bg-pattern { opacity: var(--pattern-opacity); }
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
    }
    .glass-strong {
      background: var(--glass-bg-strong);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border-strong);
    }
    .glass-card {
      background: var(--glass-card-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-card-border);
    }
    .tweet-card { transition: all 0.3s ease; }
    .tweet-card:hover {
      border-color: rgba(var(--pc-rgb, 21, 128, 61), 0.5);
      transform: translateY(-2px);
    }
    .tweet-card.shared {
      border-color: rgba(var(--pc-rgb, 21, 128, 61), 0.6) !important;
      background: rgba(var(--pc-rgb, 21, 128, 61), 0.1) !important;
    }
    .tweet-card.shared .share-status { display: flex !important; }
    html.light .tweet-card:hover {
      border-color: rgba(var(--pc-rgb, 21, 128, 61), 0.4);
      background: rgba(var(--pc-rgb, 21, 128, 61), 0.03);
    }
    html.light .tweet-card.shared {
      border-color: rgba(var(--pc-rgb, 21, 128, 61), 0.5) !important;
      background: rgba(var(--pc-rgb, 21, 128, 61), 0.06) !important;
    }
    .bg-pattern {
      background-image:
        radial-gradient(circle at 20% 50%, rgba(var(--pc-rgb, 21, 128, 61), 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(var(--sc-rgb, 185, 28, 28), 0.15) 0%, transparent 50%),
        radial-gradient(circle at 50% 100%, rgba(10, 10, 10, 0.8) 0%, transparent 50%);
    }
    .countdown-box {
      background: linear-gradient(135deg, rgba(var(--pc-rgb, 21, 128, 61), 0.2), rgba(var(--sc-rgb, 185, 28, 28), 0.2));
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    html.light .countdown-box {
      background: linear-gradient(135deg, rgba(var(--pc-rgb, 21, 128, 61), 0.1), rgba(var(--sc-rgb, 185, 28, 28), 0.1));
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .btn-share {
      background: linear-gradient(135deg, var(--primary-color, #15803d), var(--primary-color, #16a34a), var(--primary-color, #15803d));
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
    }
    .btn-share:hover { animation-play-state: paused; filter: brightness(1.1); }
    .btn-share.shared-btn {
      background: linear-gradient(135deg, var(--primary-dark, #14532d), var(--primary-color, #15803d), var(--primary-dark, #14532d));
      opacity: 0.9;
    }
    .btn-share.shared-btn::after {
      content: '\2714';
      margin-right: 6px;
      font-size: 0.9em;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .share-modal-overlay {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
    }
    html.light .share-modal-overlay { background: rgba(0, 0, 0, 0.5); }
    .share-modal { animation: scaleIn 0.3s ease-out forwards; }
    .media-container video, .media-container img {
      max-height: 300px;
      object-fit: contain;
    }
    .theme-toggle { transition: all 0.3s ease; }
    .theme-toggle:hover { transform: scale(1.1); }
    .parallax-bg { will-change: transform; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
    ::-webkit-scrollbar-thumb { background: #15803d; border-radius: 3px; }
    html { scroll-behavior: smooth; }
    .participation-badge {
      display: none;
      align-items: center;
      gap: 4px;
      background: rgba(21, 128, 61, 0.2);
      color: #16a34a;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 9999px;
      font-weight: 600;
    }
    html.light .participation-badge { background: rgba(21, 128, 61, 0.1); }
    .security-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.65rem;
      opacity: 0.6;
    }
    /* ===== Multi-platform Share Buttons ===== */
    .share-btn {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .share-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.15);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.3s ease;
    }
    .share-btn:hover::before { transform: scaleX(1); transform-origin: left; }
    .share-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); }
    .share-btn:active { transform: translateY(0) scale(0.97); }
    .share-x { background: linear-gradient(135deg, #000000, #1a1a1a); }
    .share-whatsapp { background: linear-gradient(135deg, #25D366, #128C7E); }
    .share-facebook { background: linear-gradient(135deg, #1877F2, #0a5cc4); }
    .share-telegram { background: linear-gradient(135deg, #0088cc, #005580); }
    .share-native { background: linear-gradient(135deg, #6366f1, #4338ca); }
    .share-copy { background: linear-gradient(135deg, #475569, #334155); }
    .share-btn-row {
      transition: all 0.2s ease;
    }
    .share-btn-row:hover { transform: translateY(-1px) scale(1.05); }
    /* ===== Gradient Brand Title ===== */
    .brand-gradient-text {
      background: linear-gradient(135deg, #16a34a 0%, #4ade80 35%, #f59e0b 70%, #ef4444 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: brandShift 5s ease infinite;
    }
    @keyframes brandShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    /* ===== Skeleton Loader ===== */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: skeletonShimmer 1.5s infinite;
    }
    @keyframes skeletonShimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    html.light .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
    }
    /* ===== Floating action chip ===== */
    .action-chip {
      transition: all 0.25s ease;
      backdrop-filter: blur(10px);
    }
    .action-chip:hover { transform: translateY(-1px); }
    /* ===== Achievement Badge ===== */
    .achievement-badge {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
      animation: glowRed 2s ease-in-out infinite alternate;
    }
    /* ===== Toast ===== */
    .toast {
      animation: slideUp 0.4s ease-out forwards, fadeOut 0.4s ease-in 2.6s forwards;
    }
    /* ===== Progress ring & bars ===== */
    .progress-fill-glow {
      box-shadow: 0 0 12px rgba(22, 163, 74, 0.6);
    }
    /* ===== QR container ===== */
    .qr-container { display: inline-block; padding: 12px; background: #fff; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
    .qr-container img, .qr-container canvas { display: block; margin: 0 auto; }
    /* ===== Filter input ===== */
    .filter-input {
      transition: all 0.25s ease;
      background: var(--input-bg);
      border: 1px solid var(--glass-card-border);
    }
    .filter-input:focus {
      outline: none;
      border-color: rgba(22, 163, 74, 0.6);
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15);
    }
    /* ===== Campaign card enhanced ===== */
    .campaign-list-item {
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .campaign-list-item:hover {
      transform: translateY(-3px);
      border-color: rgba(22, 163, 74, 0.5) !important;
    }
    .campaign-list-item.active {
      border-color: rgba(22, 163, 74, 0.6) !important;
      box-shadow: 0 0 0 2px rgba(22, 163, 74, 0.3);
    }
    /* ===== Tooltip ===== */
    [data-tip] { position: relative; }
    [data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      color: #fff;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.65rem;
      white-space: nowrap;
      z-index: 50;
      pointer-events: none;
    }
  </style>
</head>

<body
  class="font-cairo bg-yemen-black text-white min-h-screen overflow-x-hidden antialiased"
  x-data="campaignApp()"
  x-init="init()"
  :class="{ 'light': isLightMode }"
>
  <!-- Background Layer -->
  <div class="fixed inset-0 bg-pattern pointer-events-none z-0 parallax-bg"></div>

  <!-- Floating particles -->
  <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
    <div class="absolute top-20 left-10 w-2 h-2 bg-yemen-green/30 rounded-full animate-float" style="animation-delay: 0s;"></div>
    <div class="absolute top-60 right-20 w-1.5 h-1.5 bg-yemen-red/30 rounded-full animate-float" style="animation-delay: 1s;"></div>
    <div class="absolute bottom-40 left-1/4 w-2 h-2 bg-white/10 rounded-full animate-float" style="animation-delay: 2s;"></div>
    <div class="absolute top-40 right-1/3 w-1 h-1 bg-yemen-green/40 rounded-full animate-float" style="animation-delay: 3s;"></div>
  </div>

  <!-- Loading State -->
  <template x-if="loading && !selectedCampaign">
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-yemen-black p-4">
      <div class="max-w-md w-full">
        <!-- Logo skeleton -->
        <div class="flex flex-col items-center mb-8">
          <div class="skeleton w-20 h-20 rounded-full mb-4"></div>
          <div class="skeleton h-6 w-48 rounded-lg mb-2"></div>
          <div class="skeleton h-3 w-32 rounded-lg"></div>
        </div>
        <!-- Cards skeleton -->
        <div class="space-y-3">
          <div class="skeleton h-20 rounded-2xl"></div>
          <div class="skeleton h-20 rounded-2xl"></div>
          <div class="skeleton h-20 rounded-2xl"></div>
        </div>
        <p class="text-gray-500 text-xs text-center mt-6 flex items-center justify-center gap-2">
          <svg class="w-4 h-4 animate-spin text-yemen-green" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
          جاري تحميل الحملات...
        </p>
      </div>
    </div>
  </template>

  <!-- Inline loading (campaign selected) -->
  <template x-if="loading && selectedCampaign">
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
      <div class="glass-strong rounded-2xl p-6 flex items-center gap-3">
        <div class="w-8 h-8 border-3 border-yemen-green border-t-transparent rounded-full animate-spin"></div>
        <span class="text-sm font-semibold" :class="isLightMode ? 'text-gray-900' : 'text-white'">جاري تحميل التغريدات...</span>
      </div>
    </div>
  </template>

  <!-- Error State -->
  <template x-if="error && !loading">
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-yemen-black p-4">
      <div class="glass-strong rounded-2xl p-8 max-w-md w-full text-center">
        <div class="w-16 h-16 bg-yemen-red/20 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-yemen-red" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
          </svg>
        </div>
        <h2 class="text-xl font-bold mb-2">عذراً، حدث خطأ</h2>
        <p class="text-gray-400 mb-6" x-text="error"></p>
        <button
          @click="init()"
          class="bg-yemen-green hover:bg-yemen-greenLight text-white px-6 py-2.5 rounded-xl transition-all duration-300 font-semibold"
        >
          إعادة المحاولة
        </button>
      </div>
    </div>
  </template>

  <!-- Share Modal -->
  <template x-if="showShareModal">
    <div class="share-modal-overlay fixed inset-0 z-[60] flex items-center justify-center p-4" @click.self="closeShareModal()">
      <div class="share-modal glass-strong rounded-3xl p-6 md:p-8 max-w-lg w-full relative" :class="{ 'bg-white/95': isLightMode }">
        <!-- Close Button -->
        <button
          @click="closeShareModal()"
          class="absolute top-4 left-4 w-8 h-8 rounded-full flex items-center justify-center transition-colors"
          :class="isLightMode ? 'hover:bg-gray-100 text-gray-500' : 'hover:bg-white/10 text-gray-400'"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>

        <!-- Modal Header -->
        <div class="text-center mb-5">
          <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-yemen-green/30 to-yemen-green/10 flex items-center justify-center mx-auto mb-3">
            <svg class="w-7 h-7 text-yemen-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.291 12.934 8 12.403 8 11.75c0-1.5 1.5-3 3.5-3 1.397 0 2.397.651 3.4 1.5M9 4h6m-3 0V2m0 2a9 9 0 100 18m0-18a9 9 0 110 18m0 0v2m0-2c1.397 0 2.397-.651 3.4-1.5"/>
            </svg>
          </div>
          <h3 class="text-xl font-black" :class="isLightMode ? 'text-gray-900' : 'text-white'">مشاركة التغريدة</h3>
          <p class="text-sm mt-1" :class="isLightMode ? 'text-gray-500' : 'text-gray-400'">اختر المنصة المناسبة لنشر التغريدة</p>
        </div>

        <!-- Tweet Preview Card -->
        <div class="glass-card rounded-xl p-4 mb-4 text-right relative">
          <button
            @click="copyTweetText(getSharePreviewText(selectedTweet))"
            class="absolute top-2 left-2 w-7 h-7 rounded-lg flex items-center justify-center text-gray-400 hover:text-yemen-green hover:bg-yemen-green/10 transition-colors"
            data-tip="نسخ النص"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          </button>
          <div class="flex items-start gap-3">
            <img :src="siteLogo" alt="" class="w-10 h-10 rounded-full object-cover border border-yemen-green/30 flex-shrink-0" onerror="this.style.display='none'">
            <div class="flex-1 min-w-0">
              <p class="text-sm font-bold" :class="isLightMode ? 'text-gray-900' : 'text-white'" x-text="siteName"></p>
              <p class="text-xs mb-2" :class="isLightMode ? 'text-gray-500' : 'text-gray-400'" x-text="siteHashtag || '@handle'"></p>
              <p class="text-sm leading-relaxed break-words whitespace-pre-wrap" :class="isLightMode ? 'text-gray-700' : 'text-gray-200'" x-text="getSharePreviewText(selectedTweet)"></p>
            </div>
          </div>
        </div>

        <!-- Character Count -->
        <div class="flex items-center justify-between mb-5 px-1">
          <span class="text-xs" :class="isLightMode ? 'text-gray-500' : 'text-gray-500'">
            <span x-text="selectedTweet?.text?.length || 0"></span> / 280 حرف
          </span>
          <span
            class="text-xs px-2 py-1 rounded-full"
            :class="(selectedTweet?.text?.length || 0) > 280 ? 'bg-yemen-red/20 text-yemen-red' : 'bg-yemen-green/20 text-yemen-green'"
            x-text="(selectedTweet?.text?.length || 0) > 280 ? 'يتجاوز حد X' : 'ضمن الحد'"
          ></span>
        </div>

        <!-- Main Share Buttons Grid -->
        <div class="grid grid-cols-2 gap-3 mb-3">
          <!-- X (Twitter) -->
          <a
            x-show="enabledPlatforms.includes('x')"
            :href="getShareUrl(selectedTweet)"
            target="_blank"
            rel="noopener noreferrer"
            @click="confirmShare('x')"
            class="share-btn share-x text-white font-bold text-sm rounded-xl py-3.5 flex items-center justify-center gap-2 no-underline"
            data-tip="نشر على X"
          >
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            <span>X</span>
          </a>

          <!-- WhatsApp -->
          <a
            x-show="enabledPlatforms.includes('whatsapp')"
            :href="getWhatsAppUrl(selectedTweet)"
            target="_blank"
            rel="noopener noreferrer"
            @click="confirmShare('whatsapp')"
            class="share-btn share-whatsapp text-white font-bold text-sm rounded-xl py-3.5 flex items-center justify-center gap-2 no-underline"
            data-tip="مشاركة على واتساب"
          >
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            <span>واتساب</span>
          </a>

          <!-- Facebook -->
          <a
            x-show="enabledPlatforms.includes('facebook')"
            :href="getFacebookUrl(selectedTweet)"
            target="_blank"
            rel="noopener noreferrer"
            @click="confirmShare('facebook')"
            class="share-btn share-facebook text-white font-bold text-sm rounded-xl py-3.5 flex items-center justify-center gap-2 no-underline"
            data-tip="مشاركة على فيسبوك"
          >
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            <span>فيسبوك</span>
          </a>

          <!-- Telegram -->
          <a
            x-show="enabledPlatforms.includes('telegram')"
            :href="getTelegramUrl(selectedTweet)"
            target="_blank"
            rel="noopener noreferrer"
            @click="confirmShare('telegram')"
            class="share-btn share-telegram text-white font-bold text-sm rounded-xl py-3.5 flex items-center justify-center gap-2 no-underline"
            data-tip="مشاركة على تيليجرام"
          >
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.662 3.508-1.529 5.847-2.539 7.018-3.03 3.341-1.387 4.034-1.627 4.804-1.64z"/></svg>
            <span>تيليجرام</span>
          </a>
        </div>

        <!-- Native Share (mobile) + Copy -->
        <div class="flex gap-3 mb-3">
          <!-- Native Share API -->
          <button
            x-show="canNativeShare()"
            @click="nativeShare(selectedTweet)"
            class="share-btn share-native flex-1 text-white font-bold text-sm rounded-xl py-3 flex items-center justify-center gap-2"
            data-tip="مشاركة عبر تطبيقات الجهاز"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.291 12.934 8 12.403 8 11.75c0-1.5 1.5-3 3.5-3 1.397 0 2.397.651 3.4 1.5M9 4h6m-3 0V2m0 2a9 9 0 100 18m0-18a9 9 0 110 18"/></svg>
            <span>مشاركة المزيد</span>
          </button>

          <!-- Copy as image -->
          <button
            @click="saveTweetAsImage(selectedTweet)"
            class="share-btn share-copy flex-1 text-white font-bold text-sm rounded-xl py-3 flex items-center justify-center gap-2"
            data-tip="حفظ كصورة"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <span x-text="imageSaved ? 'تم الحفظ!' : 'حفظ كصورة'"></span>
          </button>
        </div>

        <!-- Copy text -->
        <button
          @click="copyTweetText(getSharePreviewText(selectedTweet))"
          class="w-full py-3 rounded-xl font-semibold text-sm transition-all duration-300 flex items-center justify-center gap-2 border"
          :class="isLightMode ? 'border-gray-200 text-gray-600 hover:bg-gray-50' : 'border-white/10 text-gray-300 hover:bg-white/5'"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          <span x-text="copiedText ? 'تم النسخ!' : 'نسخ النص'"></span>
        </button>

        <!-- Facebook hint -->
        <p x-show="lastSharePlatform === 'facebook'" x-transition class="text-xs text-center mt-3 text-blue-600 dark:text-blue-400">
          <svg class="w-3 h-3 inline ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
          تم نسخ النص تلقائياً — الصقه في منشور فيسبوك
        </p>

        <!-- Security Note -->
        <div class="mt-4 text-center">
          <span class="security-badge" :class="isLightMode ? 'text-gray-400' : 'text-gray-600'">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
            </svg>
            اتصال آمن ومشفر
          </span>
        </div>
      </div>
    </div>
  </template>

  <!-- QR Code Modal -->
  <template x-if="showQrModal">
    <div class="share-modal-overlay fixed inset-0 z-[60] flex items-center justify-center p-4" @click.self="closeQrModal()">
      <div class="share-modal glass-strong rounded-3xl p-6 md:p-8 max-w-sm w-full relative" :class="{ 'bg-white/95': isLightMode }">
        <button @click="closeQrModal()" class="absolute top-4 left-4 w-8 h-8 rounded-full flex items-center justify-center transition-colors" :class="isLightMode ? 'hover:bg-gray-100 text-gray-500' : 'hover:bg-white/10 text-gray-400'">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <div class="text-center mb-5">
          <div class="w-14 h-14 rounded-2xl bg-yemen-green/20 flex items-center justify-center mx-auto mb-3">
            <svg class="w-7 h-7 text-yemen-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4h4v4H4V4zm2 2v4m0 0H4m6-6h4v4h-4V4zm2 2v4M4 14h4v4H4v-4zm2 2v4M14 14h6v6h-6v-6zm0-2h2v2"/></svg>
          </div>
          <h3 class="text-xl font-black" :class="isLightMode ? 'text-gray-900' : 'text-white'">رمز QR للحملة</h3>
          <p class="text-sm mt-1" :class="isLightMode ? 'text-gray-500' : 'text-gray-400'">امسح الكود بكاميرا جوالك للوصول المباشر</p>
        </div>
        <div class="flex justify-center my-6">
          <div id="qrCodeContainer" class="qr-container"></div>
        </div>
        <button @click="downloadQr()" class="w-full py-3 rounded-xl bg-yemen-green hover:bg-yemen-greenLight text-white font-bold text-sm transition-all flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          تحميل رمز QR
        </button>
      </div>
    </div>
  </template>

  <!-- Toast Notification -->
  <div x-show="toast.show" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" class="fixed bottom-6 right-1/2 translate-x-1/2 z-[80] pointer-events-none" style="display:none;">
    <div class="glass-strong rounded-2xl px-5 py-3 shadow-2xl flex items-center gap-3 min-w-[280px] max-w-md"
      :class="{
        'border-yemen-green/40': toast.type === 'success',
        'border-red-500/40': toast.type === 'error',
        'border-blue-500/40': toast.type === 'info'
      }">
      <div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0"
        :class="{
          'bg-yemen-green/20 text-yemen-green': toast.type === 'success',
          'bg-red-500/20 text-red-400': toast.type === 'error',
          'bg-blue-500/20 text-blue-400': toast.type === 'info'
        }">
        <svg x-show="toast.type==='success'" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        <svg x-show="toast.type==='error'" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        <svg x-show="toast.type==='info'" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <span class="text-sm font-semibold" :class="isLightMode ? 'text-gray-800' : 'text-white'" x-text="toast.message"></span>
    </div>
  </div>

  <!-- Main Content -->
  <template x-if="!loading && !error">
    <div class="relative z-10 min-h-screen flex flex-col">

      <!-- Header -->
      <header class="glass sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="relative">
              <img :src="siteLogo" alt="شعار الحملة" class="w-14 h-14 md:w-16 md:h-16 rounded-full object-cover border-2 border-yemen-green/50 shadow-lg" onerror="this.style.display='none'">
            </div>
            <div class="hidden sm:block">
              <h1 class="text-sm md:text-base font-bold leading-tight" :class="isLightMode ? 'text-gray-900' : 'text-white'" x-text="selectedCampaign ? selectedCampaign.campaignName : 'السعودية سبب الفتن'"></h1>
              <p class="text-xs" :class="isLightMode ? 'text-gray-500' : 'text-gray-400'" x-text="siteName"></p>
            </div>
          </div>

          <div class="flex items-center gap-2">
            <button
              @click="toggleTheme()"
              class="theme-toggle w-10 h-10 rounded-full flex items-center justify-center"
              :class="isLightMode ? 'bg-gray-100 text-amber-500 hover:bg-gray-200' : 'bg-white/10 text-yellow-400 hover:bg-white/20'"
              :title="isLightMode ? 'الوضع الداكن' : 'الوضع الفاتح'"
            >
              <svg x-show="!isLightMode" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
              </svg>
              <svg x-show="isLightMode" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
              </svg>
            </button>

            <div class="glass-strong px-3 py-1.5 rounded-full flex items-center gap-2" :class="isLive ? 'border-yemen-green/50' : 'border-white/10'">
              <span class="w-2.5 h-2.5 rounded-full" :class="isLive ? 'bg-yemen-green animate-pulse-fast' : 'bg-gray-500'"></span>
              <span class="text-xs font-semibold" :class="isLive ? 'text-yemen-greenLight' : (isLightMode ? 'text-gray-500' : 'text-gray-300')" x-text="isLive ? 'الحملة متاحة' : 'قيد العد التنازلي'"></span>
            </div>
          </div>
        </div>
      </header>

      <!-- Hero Section -->
      <main class="flex-1 flex flex-col items-center justify-center px-4 py-8 md:py-12">
        <div class="max-w-3xl w-full">

          <!-- CAMPAIGNS LIST VIEW -->
          <div x-show="!selectedCampaign">
            <div class="text-center mb-8 md:mb-10 animate-fade-in">
              <div class="inline-flex items-center gap-2 glass px-4 py-2 rounded-full mb-4">
                <span class="w-1.5 h-1.5 bg-yemen-red rounded-full"></span>
                <span class="text-xs" :class="isLightMode ? 'text-gray-600' : 'text-gray-300'">الحملات المتاحة</span>
              </div>
              <h2 class="text-2xl sm:text-3xl md:text-4xl font-black leading-tight mb-3" :class="isLightMode ? 'text-gray-900' : 'text-white'">الحملات الإلكترونية</h2>
              <p class="text-sm md:text-base max-w-lg mx-auto" :class="isLightMode ? 'text-gray-500' : 'text-gray-400'">اختر إحدى الحملات أدناه للمشاركة فيها</p>
            </div>

            <!-- No Campaigns Message -->
            <div x-show="campaigns.length === 0" class="glass-strong rounded-3xl p-8 md:p-12 text-center animate-scale-in">
              <div class="w-20 h-20 bg-gray-700/30 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                </svg>
              </div>
              <h3 class="text-xl font-bold mb-2" :class="isLightMode ? 'text-gray-900' : 'text-white'">لا توجد حملات حالياً</h3>
              <p class="text-sm text-gray-400 mb-4">سيتم إضافة حملات جديدة قريباً. تفقد الصفحة لاحقاً.</p>
              <button @click="init()" class="bg-yemen-green hover:bg-yemen-greenLight text-white px-6 py-2.5 rounded-xl transition-all font-semibold text-sm">تحديث الصفحة</button>
            </div>

            <!-- Campaigns Grid -->
            <div class="space-y-4">
              <template x-for="campaign in campaigns" :key="campaign.id">
                <div @click="selectCampaign(campaign)" class="campaign-list-item glass-card rounded-xl p-5 md:p-6 cursor-pointer" :class="{ 'active': selectedCampaign?.id === campaign.id }">
                  <div class="flex items-start gap-4">
                    <div class="flex-shrink-0">
                      <div class="w-14 h-14 rounded-full bg-yemen-green/20 flex items-center justify-center">
                        <svg class="w-7 h-7 text-yemen-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/>
                        </svg>
                      </div>
                    </div>
                    <div class="flex-1 min-w-0">
                      <h3 class="text-lg font-bold mb-1" :class="isLightMode ? 'text-gray-900' : 'text-white'" x-text="campaign.campaignName"></h3>
                      <div class="flex items-center gap-3 flex-wrap text-xs text-gray-500 mb-2">
                        <span x-text="campaign.timezoneLabel"></span>
                        <span x-show="campaign.targetTime" x-text="'إطلاق: ' + formatDate(campaign.targetTime)"></span>
                        <span x-show="campaign.endTime" x-text="'انتهاء: ' + formatDate(campaign.endTime)"></span>
                      </div>
                      <div class="flex items-center gap-2">
                        <span class="px-2 py-1 rounded-full text-xs font-bold" :class="campaign.isActive ? 'bg-yemen-green/20 text-yemen-greenLight border border-yemen-green/30' : 'bg-gray-700/30 text-gray-400 border border-gray-600/30'" x-text="campaign.isActive ? 'نشطة' : 'معطلة'"></span>
                        <span class="text-xs text-gray-500 flex items-center gap-1">
                          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
                          اضغط للمشاركة
                        </span>
                      </div>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- SINGLE CAMPAIGN VIEW -->
          <div x-show="selectedCampaign">
            <button @click="backToCampaigns()" class="text-xs text-gray-400 hover:text-white transition-colors flex items-center gap-1 mb-4">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
              العودة إلى الحملات
            </button>

            <!-- Campaign Header -->
            <div class="text-center mb-8 animate-fade-in">
              <div class="inline-flex items-center gap-2 glass px-4 py-2 rounded-full mb-4">
                <span class="w-1.5 h-1.5 bg-yemen-red rounded-full"></span>
                <span class="text-xs" :class="isLightMode ? 'text-gray-600' : 'text-gray-300'" x-text="selectedCampaign?.timezoneLabel"></span>
              </div>
              <h2 class="text-2xl sm:text-3xl md:text-4xl font-black leading-tight mb-3" :class="isLightMode ? 'text-gray-900' : 'text-white'" x-text="selectedCampaign?.campaignName"></h2>
              <div x-show="selectedCampaign?.description" class="glass-card rounded-xl p-4 mb-4 text-center max-w-2xl mx-auto">
                <p class="text-sm leading-relaxed whitespace-pre-wrap" :class="isLightMode ? 'text-gray-600' : 'text-gray-300'" x-text="selectedCampaign?.description"></p>
              </div>

              <!-- Quick actions: Copy link + QR -->
              <div class="flex items-center justify-center gap-2 flex-wrap mb-4">
                <button
                  @click="copyCampaignLink()"
                  class="action-chip glass-card text-xs font-bold px-4 py-2 rounded-full flex items-center gap-2 transition-all"
                  :class="isLightMode ? 'text-gray-700 hover:bg-yemen-green/10' : 'text-gray-200 hover:bg-yemen-green/15'"
                  data-tip="انسخ رابط الحملة وأرسله لأصدقائك"
                >
                  <svg class="w-4 h-4 text-yemen-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
                  <span x-text="linkCopied ? 'تم النسخ!' : 'نسخ رابط الحملة'"></span>
                </button>
                <button
                  @click="openQrModal()"
                  class="action-chip glass-card text-xs font-bold px-4 py-2 rounded-full flex items-center gap-2 transition-all"
                  :class="isLightMode ? 'text-gray-700 hover:bg-yemen-green/10' : 'text-gray-200 hover:bg-yemen-green/15'"
                  data-tip="امسح الكود للوصول للحملة عبر الجوال"
                >
                  <svg class="w-4 h-4 text-yemen-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4h4v4H4V4zm2 2v4m0 0H4m6-6h4v4h-4V4zm2 2v4M4 14h4v4H4v-4zm2 2v4M14 14h6v6h-6v-6zm0-2h2v2"/></svg>
                  <span>رمز QR</span>
                </button>
              </div>
            </div>

            <!-- Countdown Timer Section -->
            <template x-if="!isLive">
              <div id="countdownSection" class="animate-fade-in" :class="{ 'animate-fade-out': transitioning }">
                <div class="glass-strong rounded-3xl p-6 md:p-10 mb-8" :class="isLightMode ? 'shadow-lg shadow-gray-200/50' : ''">
                  <p class="text-center text-sm mb-6" :class="isLightMode ? 'text-gray-500' : 'text-gray-300'">الوقت المتبقي للإطلاق</p>

                  <div class="grid grid-cols-4 gap-3 md:gap-6">
                    <div class="countdown-box rounded-2xl p-3 md:p-5 text-center">
                      <div class="text-2xl sm:text-3xl md:text-5xl font-black mb-1 tabular-nums" :class="isLightMode ? 'text-gray-900' : 'text-white'" x-text="String(timeLeft.days).padStart(2, '0')"></div>
                      <div class="text-xs" :class="isLightMode ? 'text-gray-500' : 'text-gray-400'">يوم</div>
                    </div>
                    <div class="countdown-box rounded-2xl p-3 md:p-5 text-center">
                      <div class="text-2xl sm:text-3xl md:text-5xl font-black mb-1 tabular-nums" :class="isLightMode ? 'text-gray-900' : 'text-white'" x-text="String(timeLeft.hours).padStart(2, '0')"></div>
                      <div class="text-xs" :class="isLightMode ? 'text-gray-500' : 'text-gray-400'">ساعة</div>
                    </div>
                    <div class="countdown-box rounded-2xl p-3 md:p-5 text-center">
                      <div class="text-2xl sm:text-3xl md:text-5xl font-black mb-1 tabular-nums" :class="isLightMode ? 'text-gray-900' : 'text-white'" x-text="String(timeLeft.minutes).padStart(2, '0')"></div>
                      <div class="text-xs" :class="isLightMode ? 'text-gray-500' : 'text-gray-400'">دقيقة</div>
                    </div>
                    <div class="countdown-box rounded-2xl p-3 md:p-5 text-center relative overflow-hidden">
                      <div class="absolute inset-0 bg-gradient-to-b from-yemen-green/10 to-transparent pointer-events-none"></div>
                      <div class="text-2xl sm:text-3xl md:text-5xl font-black text-yemen-greenLight mb-1 tabular-nums relative z-10" x-text="String(timeLeft.seconds).padStart(2, '0')"></div>
                      <div class="text-xs relative z-10" :class="isLightMode ? 'text-gray-500' : 'text-gray-400'">ثانية</div>
                    </div>
                  </div>

                  <div class="mt-6 md:mt-8">
                    <div class="flex justify-between text-xs mb-2" :class="isLightMode ? 'text-gray-400' : 'text-gray-500'"><span>التقدم</span><span x-text="progressPercent + '%'"></span></div>
                    <div class="h-2 rounded-full overflow-hidden" :class="isLightMode ? 'bg-gray-200' : 'bg-white/10'">
                      <div class="h-full rounded-full transition-all duration-1000 ease-linear" :class="progressPercent > 90 ? 'bg-gradient-to-r from-yemen-green to-yemen-red' : 'bg-gradient-to-r from-yemen-green to-yemen-greenLight'" :style="'width: ' + progressPercent + '%'"></div>
                    </div>
                  </div>

                  <div class="mt-4 text-center">
                    <p class="text-xs" :class="isLightMode ? 'text-gray-400' : 'text-gray-500'">موعد الإطلاق: <span :class="isLightMode ? 'text-gray-700' : 'text-gray-300'" x-text="formatTargetTime()"></span></p>
                  </div>

                  <!-- Notification Button -->
                  <div class="mt-4 text-center" x-show="!notificationEnabled && !isLive">
                    <button
                      @click="requestLaunchNotification()"
                      class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-bold transition-all duration-300 border"
                      :class="isLightMode ? 'border-yemen-green/30 text-yemen-green hover:bg-yemen-green/10' : 'border-yemen-green/40 text-yemen-greenLight hover:bg-yemen-green/20'"
                    >
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v1m6-10a1 1 0 11-2 0 1 1 0 012 0z"/>
                      </svg>
                      <span>تفعيل تنبيه الإطلاق</span>
                    </button>
                    <p class="text-xs mt-1.5" :class="isLightMode ? 'text-gray-400' : 'text-gray-500'">سنُعلمك بإشعار عند انطلاق الحملة</p>
                  </div>

                  <div class="mt-4 text-center" x-show="notificationEnabled && !isLive" x-transition>
                    <div class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-yemen-green/10 border border-yemen-green/30">
                      <span class="w-2 h-2 bg-yemen-green rounded-full animate-pulse"></span>
                      <span class="text-xs font-bold text-yemen-greenLight">التنبيه مفعّل — سيتم إعلامك بالإطلاق</span>
                    </div>
                  </div>
                </div>
              </div>
            </template>

            <!-- Live Section -->
            <template x-if="isLive || transitioning">
              <div id="ctaSection" class="animate-scale-in">
                <div class="glass-strong rounded-3xl p-6 md:p-10 border-yemen-green/30" :class="isLightMode ? 'shadow-xl shadow-yemen-green/10 border-yemen-green/20 bg-white/90' : ''">

                  <!-- Live Badge -->
                  <div class="text-center">
                    <div class="inline-flex items-center gap-2 bg-yemen-green/20 border border-yemen-green/40 px-4 py-2 rounded-full mb-6">
                      <span class="w-2.5 h-2.5 bg-yemen-green rounded-full animate-pulse-fast"></span>
                      <span class="text-yemen-greenLight font-bold text-sm">الحملة الآن متاحة</span>
                    </div>
                  </div>

                  <h3 class="text-2xl md:text-3xl font-black mb-3 text-center" :class="isLightMode ? 'text-gray-900' : 'text-white'">انضم الآن إلى الحملة</h3>
                  <p class="text-sm md:text-base mb-8 max-w-md mx-auto text-center" :class="isLightMode ? 'text-gray-500' : 'text-gray-300'">الحملة قد انطلقت رسمياً. اختر إحدى التغريدات أدناه للمشاركة فوراً على منصة X.</p>

                  <div class="mb-6">
                    <button @click="showInstructions = !showInstructions" class="w-full flex items-center justify-between glass-card rounded-xl p-4 text-sm transition-all hover:bg-white/5" :class="isLightMode ? 'text-gray-900' : 'text-white'">
                      <span class="flex items-center gap-2 font-bold">
                        <svg class="w-4 h-4 text-yemen-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        تعليمات المشاركة
                      </span>
                      <svg class="w-4 h-4 transition-transform duration-300" :class="showInstructions ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <div x-show="showInstructions" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 transform scale-y-0 origin-top" x-transition:enter-end="opacity-100 transform scale-y-100 origin-top" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 transform scale-y-100 origin-top" x-transition:leave-end="opacity-0 transform scale-y-0 origin-top" class="mt-2 glass-card rounded-xl p-4 text-right">
                      <ul class="text-xs space-y-2 list-disc list-inside" :class="isLightMode ? 'text-gray-600' : 'text-gray-400'">
                        <li>اضغط على زر <span class="text-yemen-green font-bold">"شارك الآن"</span> بجانب أي تغريدة</li>
                        <li>سيتم فتح منصة X في نافذة جديدة مع النص جاهزاً للنشر</li>
                        <li>يمكنك نسخ النص وإضافة هاشتاقات إضافية قبل النشر</li>
                        <li>شارك في أكبر عدد ممكن من التغريدات لإنجاح الحملة</li>
                      </ul>
                    </div>
                  </div>

                  <!-- Tweets List -->
                  <div class="mb-8">
                    <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
                      <h4 class="text-sm font-bold flex items-center gap-2" :class="isLightMode ? 'text-gray-900' : 'text-white'">
                        <svg class="w-4 h-4 text-yemen-green" fill="currentColor" viewBox="0 0 24 24">
                          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                        </svg>
                        اختر تغريدة للمشاركة
                        <span class="bg-yemen-green/20 text-yemen-greenLight text-xs px-2 py-0.5 rounded-full" x-text="filteredTweets.length + ' تغريدة'"></span>
                      </h4>
                      <!-- Sort buttons -->
                      <div class="flex items-center gap-1 text-xs">
                        <span class="text-gray-500 ml-1">ترتيب:</span>
                        <button @click="sortBy='newest'" class="px-2 py-1 rounded-md transition-colors" :class="sortBy==='newest' ? 'bg-yemen-green/20 text-yemen-greenLight font-bold' : 'text-gray-400 hover:bg-white/5'">الأحدث</button>
                        <button @click="sortBy='longest'" class="px-2 py-1 rounded-md transition-colors" :class="sortBy==='longest' ? 'bg-yemen-green/20 text-yemen-greenLight font-bold' : 'text-gray-400 hover:bg-white/5'">الأطول</button>
                        <button @click="sortBy='shortest'" class="px-2 py-1 rounded-md transition-colors" :class="sortBy==='shortest' ? 'bg-yemen-green/20 text-yemen-greenLight font-bold' : 'text-gray-400 hover:bg-white/5'">الأقصر</button>
                      </div>
                    </div>

                    <!-- Progress + participation count -->
                    <div class="mb-4 glass-card rounded-xl p-4">
                      <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-2 text-xs font-bold" :class="isLightMode ? 'text-gray-700' : 'text-gray-200'">
                          <svg class="w-4 h-4 text-yemen-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                          تقدّم مشاركتك
                        </div>
                        <span class="text-xs font-bold" :class="isLightMode ? 'text-gray-700' : 'text-gray-200'">
                          <span x-text="getParticipationCount()"></span> / <span x-text="filteredTweets.length"></span>
                          (<span x-text="getParticipationPercent()"></span>%)
                        </span>
                      </div>
                      <div class="h-2.5 rounded-full overflow-hidden" :class="isLightMode ? 'bg-gray-200' : 'bg-white/10'">
                        <div class="h-full rounded-full transition-all duration-700 ease-out progress-fill-glow"
                          :style="'width:' + getParticipationPercent() + '%'"
                          :class="getParticipationPercent() === 100 ? 'bg-gradient-to-r from-amber-500 to-red-500' : 'bg-gradient-to-r from-yemen-green to-yemen-greenLight'">
                        </div>
                      </div>
                      <div x-show="getParticipationPercent() === 100" x-transition class="mt-3 text-center">
                        <div class="inline-flex items-center gap-2 achievement-badge text-white text-xs font-bold px-4 py-2 rounded-full">
                          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                          مُشارك مميّز — أكملت جميع التغريدات! 🎉
                        </div>
                      </div>
                    </div>

                    <!-- Search input -->
                    <div class="relative mb-4">
                      <input
                        type="text"
                        x-model="searchQuery"
                        placeholder="ابحث في التغريدات..."
                        class="filter-input w-full pr-10 pl-4 py-2.5 rounded-xl text-sm text-white placeholder-gray-500"
                      >
                      <svg class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                      <button x-show="searchQuery" @click="searchQuery=''" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-200">

                      </button>
                    </div>

                      <template x-for="(tweet, index) in filteredTweets" :key="tweet.id">
                        <div class="tweet-card glass-card rounded-xl p-4 relative" :class="{ 'shared': isShared(tweet.id) }" :data-tweet-id="tweet.id">
                          <div class="share-status participation-badge absolute top-3 left-3">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>

                          <div class="flex items-start gap-3">
                            <div class="flex-shrink-0">
                              <div class="w-10 h-10 rounded-full bg-yemen-green/20 flex items-center justify-center">
                                <span class="text-sm font-bold text-yemen-green" x-text="index + 1"></span>
                              </div>
                            </div>
                            <div class="flex-1 min-w-0">
                              <p class="text-sm leading-relaxed break-words whitespace-pre-wrap" :class="isLightMode ? 'text-gray-700' : 'text-gray-200'" x-text="tweet.text"></p>
                              <div class="flex items-center gap-3 mt-3 flex-wrap">
                                <span class="text-xs" :class="isLightMode ? 'text-gray-400' : 'text-gray-500'" x-text="formatDate(tweet.created_at)"></span>
                                <span class="text-xs" :class="isLightMode ? 'text-gray-300' : 'text-gray-700'">|</span>
                                <span class="text-xs" :class="isLightMode ? 'text-gray-400' : 'text-gray-500'" x-text="tweet.text.length + ' حرف'"></span>
                              </div>
                            </div>
                          </div>
                          <div class="mt-4 pt-4 border-t" :class="isLightMode ? 'border-gray-100' : 'border-white/5'">
                            <!-- Multi-platform share buttons -->
                            <div class="flex flex-wrap items-center gap-2">
                              <!-- X (Twitter) -->
                              <a
                                x-show="enabledPlatforms.includes('x')"
                                :href="getShareUrl(tweet)"
                                target="_blank"
                                rel="noopener noreferrer"
                                @click="markAsShared(tweet.id, 'x')"
                                class="share-btn share-x text-white font-bold text-xs rounded-lg px-3 py-2 flex items-center gap-1.5 no-underline"
                                data-tip="مشاركة على X"
                              >
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                                <span>X</span>
                              </a>

                              <!-- WhatsApp -->
                              <a
                                x-show="enabledPlatforms.includes('whatsapp')"
                                :href="getWhatsAppUrl(tweet)"
                                target="_blank"
                                rel="noopener noreferrer"
                                @click="markAsShared(tweet.id, 'whatsapp')"
                                class="share-btn share-whatsapp text-white font-bold text-xs rounded-lg px-3 py-2 flex items-center gap-1.5 no-underline"
                                data-tip="مشاركة على واتساب"
                              >
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                <span>واتساب</span>
                              </a>

                              <!-- Facebook -->
                              <a
                                x-show="enabledPlatforms.includes('facebook')"
                                :href="getFacebookUrl(tweet)"
                                target="_blank"
                                rel="noopener noreferrer"
                                @click="markAsShared(tweet.id, 'facebook')"
                                class="share-btn share-facebook text-white font-bold text-xs rounded-lg px-3 py-2 flex items-center gap-1.5 no-underline"
                                data-tip="مشاركة على فيسبوك"
                              >
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                                <span>فيسبوك</span>
                              </a>

                              <!-- Telegram -->
                              <a
                                x-show="enabledPlatforms.includes('telegram')"
                                :href="getTelegramUrl(tweet)"
                                target="_blank"
                                rel="noopener noreferrer"
                                @click="markAsShared(tweet.id, 'telegram')"
                                class="share-btn share-telegram text-white font-bold text-xs rounded-lg px-3 py-2 flex items-center gap-1.5 no-underline"
                                data-tip="مشاركة على تيليجرام"
                              >
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.662 3.508-1.529 5.847-2.539 7.018-3.03 3.341-1.387 4.034-1.627 4.804-1.64z"/></svg>
                                <span>تيليجرام</span>

                              <!-- Native share -->
                              <button
                                x-show="canNativeShare()"
                                @click="nativeShare(tweet)"
                                class="share-btn share-native text-white font-bold text-xs rounded-lg px-3 py-2 flex items-center gap-1.5"
                                data-tip="مشاركة عبر الجهاز"
                              >
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.291 12.934 8 12.403 8 11.75c0-1.5 1.5-3 3.5-3 1.397 0 2.397.651 3.4 1.5M9 4h6m-3 0V2m0 2a9 9 0 100 18m0-18a9 9 0 110 18"/></svg>
                                <span>المزيد</span>
                              </button>

                              <!-- Copy -->
                              <button
                                @click="copyTweetText(getSharePreviewText(tweet)); markAsShared(tweet.id, 'copy')"
                                class="share-btn share-copy text-white font-bold text-xs rounded-lg px-3 py-2 flex items-center gap-1.5"
                                data-tip="نسخ النص"
                              >
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                                <span>نسخ</span>
                              </button>

                              <!-- View in modal -->
                              <button
                                @click="openShareModal(tweet)"
                                class="text-xs font-semibold px-3 py-2 rounded-lg border transition-all flex items-center gap-1.5"
                                :class="isLightMode ? 'border-gray-200 text-gray-600 hover:bg-gray-50' : 'border-white/10 text-gray-300 hover:bg-white/5'"
                                data-tip="عرض كامل"
                              >
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                <span>عرض</span>
                              </button>

                      </template>

                    <div x-show="tweets.length === 0" class="text-center py-8">
                      <svg class="w-12 h-12 mx-auto mb-3" :class="isLightMode ? 'text-gray-300' : 'text-gray-600'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                      </svg>
                      <p class="text-sm" :class="isLightMode ? 'text-gray-500' : 'text-gray-400'">لا توجد تغريدات متاحة حالياً</p>
                    </div>
                  </div>

                  <div x-show="selectedCampaign?.videoUrl" class="mt-6">
                    <div class="glass-card rounded-xl overflow-hidden media-container">
                      <video :src="selectedCampaign?.videoUrl" controls class="w-full max-h-80 object-contain bg-black" :poster="siteLogo">متصفحك لا يدعم تشغيل الفيديو.</video>
                    </div>
