<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="لوحة تحكم الأدمن - السعودية سبب الفتن">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>لوحة التحكم | السعودية سبب الفتن</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { cairo: ['Cairo', 'sans-serif'] },
          colors: {
            yemen: { green: '#1e3a8a', greenLight: '#2563eb', greenDark: '#1e40af', greenPale: '#dbeafe', green50: '#eff6ff', red: '#d97706', redLight: '#f59e0b', redDark: '#b45309', redPale: '#fef3c7', black: '#0a0a0a' },
            light: { bg: '#f8fafc', card: '#ffffff', border: '#e2e8f0', text: '#1e293b', muted: '#64748b', hover: '#f1f5f9' }
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out forwards', 'shake': 'shake 0.5s ease-in-out', 'slide-up': 'slideUp 0.5s ease-out forwards',
            'scale-in': 'scaleIn 0.4s ease-out forwards', 'float': 'float 6s ease-in-out infinite'
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            shake: { '0%, 100%': { transform: 'translateX(0)' }, '25%': { transform: 'translateX(-5px)' }, '75%': { transform: 'translateX(5px)' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            scaleIn: { '0%': { opacity: '0', transform: 'scale(0.9)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
            float: { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-20px)' } }
          }
        }
      }
    }
  </script>
  <style>
    :root { --glass-bg: rgba(255,255,255,0.08); --glass-border: rgba(255,255,255,0.1); --glass-bg-strong: rgba(255,255,255,0.12); --glass-border-strong: rgba(255,255,255,0.15); --glass-card-bg: rgba(255,255,255,0.05); --glass-card-border: rgba(255,255,255,0.08); --glass-input-bg: rgba(0,0,0,0.3); --glass-input-border: rgba(255,255,255,0.1); --scrollbar-track: #0a0a0a; }
    html.light { --glass-bg: rgba(255,255,255,0.85); --glass-border: rgba(148,163,184,0.2); --glass-bg-strong: rgba(255,255,255,0.95); --glass-border-strong: rgba(148,163,184,0.25); --glass-card-bg: rgba(255,255,255,0.8); --glass-card-border: rgba(148,163,184,0.15); --glass-input-bg: rgba(241,245,249,0.9); --glass-input-border: rgba(148,163,184,0.25); --scrollbar-track: #f1f5f9; }
    html.light body { background: linear-gradient(135deg, #f8fafc 0%, #f0fdf4 50%, #fef2f2 100%); color: #1e293b; }
    .glass { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); }
    .glass-strong { background: var(--glass-bg-strong); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--glass-border-strong); }
    .glass-card { background: var(--glass-card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-card-border); }
    .glass-input { background: var(--glass-input-bg); border: 1px solid var(--glass-input-border); transition: all 0.3s ease; color: inherit; }
    html.light .glass-input { color: #1e293b; }
    .glass-input:focus { border-color: rgba(21,128,61,0.6); box-shadow: 0 0 0 3px rgba(21,128,61,0.15); outline: none; }
    .glass-input.error { border-color: rgba(185,28,28,0.6); box-shadow: 0 0 0 3px rgba(185,28,28,0.15); }
    html.light .glass-input::placeholder { color: #94a3b8; }
    .tweet-item { transition: all 0.2s ease; }
    .tweet-item:hover { border-color: rgba(21,128,61,0.4); transform: translateY(-1px); }
    .tab-btn { transition: all 0.3s ease; border-bottom: 2px solid transparent; }
    .tab-btn.active { border-bottom-color: #15803d; color: white; }
    html.light .tab-btn.active { color: #15803d; }
    .file-drop-zone { transition: all 0.3s ease; border: 2px dashed rgba(21,128,61,0.3); }
    .file-drop-zone:hover, .file-drop-zone.drag-over { border-color: rgba(21,128,61,0.8); background: rgba(21,128,61,0.05); }
    html.light .file-drop-zone { border-color: rgba(21,128,61,0.2); background: rgba(21,128,61,0.02); }
    .excel-preview-row:hover { background: rgba(21,128,61,0.05); }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--scrollbar-track); } ::-webkit-scrollbar-thumb { background: #15803d; border-radius: 3px; }
  </style>
</head>
<body class="font-cairo bg-yemen-black text-white min-h-screen antialiased" x-data="adminApp()" x-init="checkSession()">
  <div class="fixed inset-0 pointer-events-none z-0"><div class="absolute inset-0 bg-gradient-to-br from-yemen-green/5 via-transparent to-yemen-red/5"></div></div>

  <!-- LOGIN VIEW -->
  <template x-if="!isAuthenticated">
    <div class="relative z-10 min-h-screen flex items-center justify-center p-4">
      <div class="w-full max-w-md">
        <div class="text-center mb-8 animate-fade-in">
          <img src="/logo-dark.png" alt="" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-yemen-green/40 shadow-xl object-cover" onerror="this.style.display='none'">
          <h1 class="text-2xl font-black mb-1">لوحة التحكم</h1>
           <p class="text-sm text-gray-400">السعودية سبب الفتن</p>
        </div>
        <div class="glass rounded-2xl p-6 md:p-8 animate-slide-up" :class="{ 'animate-shake': shakeError }">
          <h2 class="text-lg font-bold mb-1">تسجيل الدخول</h2>
          <p class="text-sm text-gray-400 mb-6">أدخل بيانات الاعتماد للوصول إلى لوحة التحكم</p>
          <template x-if="loginError">
            <div class="bg-yemen-red/10 border border-yemen-red/30 rounded-xl p-3 mb-4 flex items-start gap-2">
              <svg class="w-5 h-5 text-yemen-red flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <p class="text-sm text-yemen-redLight" x-text="loginError"></p>
            </div>
          </template>
          <form @submit.prevent="handleLogin" class="space-y-4" autocomplete="on">
            <div>
              <label class="block text-sm font-semibold text-gray-300 mb-1.5">اسم المستخدم</label>
              <input type="text" x-model="loginForm.username" class="glass-input w-full px-4 py-3 rounded-xl placeholder-gray-500 text-sm" placeholder="أدخل اسم المستخدم" dir="rtl" required>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-300 mb-1.5">كلمة المرور</label>
              <div class="relative">
                <input :type="showPassword ? 'text' : 'password'" x-model="loginForm.password" class="glass-input w-full px-4 py-3 rounded-xl placeholder-gray-500 text-sm pl-12" placeholder="أدخل كلمة المرور" dir="rtl" required minlength="6">
                <button type="button" @click="showPassword = !showPassword" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
                  <svg x-show="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                  <svg x-show="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                </button>
              </div>
            </div>
            <button type="submit" :disabled="loginLoading" class="w-full bg-yemen-green hover:bg-yemen-greenLight disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-3 rounded-xl transition-all duration-300 flex items-center justify-center gap-2">
              <template x-if="loginLoading"><svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg></template>
              <span x-text="loginLoading ? 'جاري التحقق...' : 'تسجيل الدخول'"></span>
            </button>
          </form>
        </div>
        <div class="text-center mt-6">
          <a href="/" class="text-sm text-gray-500 hover:text-gray-300 transition-colors flex items-center justify-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            العودة إلى الصفحة الرئيسية
          </a>
        </div>
      </div>
    </div>
  </template>

  <!-- DASHBOARD VIEW -->
  <template x-if="isAuthenticated">
    <div class="relative z-10 min-h-screen">
      <header class="glass sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <img src="/logo-dark.png" alt="" class="w-10 h-10 rounded-full border border-yemen-green/40 object-cover" onerror="this.style.display='none'">
            <div><h1 class="text-sm font-bold">لوحة التحكم</h1><p class="text-xs text-gray-400" x-text="userInfo.adminType === 'main' ? 'المشرف الرئيسي' : userInfo.name"></p></div>
          </div>
          <div class="flex items-center gap-3">
            <div class="hidden sm:flex items-center gap-2 glass-card px-3 py-1.5 rounded-full">
              <span class="w-2 h-2 rounded-full" :class="userInfo.adminType === 'main' ? 'bg-yemen-green' : 'bg-yemen-greenLight'"></span>
              <span class="text-xs text-gray-300" x-text="userInfo.adminType === 'main' ? 'مدير النظام' : 'مشرف فرعي'"></span>
            </div>
            <button @click="logout" class="text-sm text-gray-400 hover:text-yemen-red transition-colors flex items-center gap-1">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
              <span class="hidden sm:inline">خروج</span>
            </button>
          </div>
        </div>
      </header>

      <main class="max-w-7xl mx-auto px-4 py-6 md:py-8">
        <!-- Messages -->
        <template x-if="successMessage">
          <div class="bg-yemen-green/10 border border-yemen-green/30 rounded-xl p-4 mb-6 flex items-start gap-3 animate-slide-up">
            <svg class="w-5 h-5 text-yemen-green flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <p class="text-sm font-semibold text-yemen-greenLight" x-text="successMessage"></p>
          </div>
        </template>
        <template x-if="saveError">
          <div class="bg-yemen-red/10 border border-yemen-red/30 rounded-xl p-4 mb-6 flex items-start gap-3 animate-slide-up">
            <svg class="w-5 h-5 text-yemen-red flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <p class="text-sm font-semibold text-yemen-redLight" x-text="saveError"></p>
          </div>
        </template>

        <!-- Tabs -->
        <div class="flex gap-4 mb-6 border-b border-white/10 overflow-x-auto pb-1">
          <button @click="activeTab = 'campaigns'" class="tab-btn pb-3 text-sm font-semibold whitespace-nowrap" :class="activeTab === 'campaigns' ? 'active text-white' : 'text-gray-500 hover:text-gray-300'"><span class="flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg> الحملات <span class="text-xs px-1.5 py-0.5 rounded-full" :class="activeTab === 'campaigns' ? 'bg-yemen-green/20 text-yemen-greenLight' : 'bg-gray-700/30 text-gray-500'" x-text="campaigns.length"></span></span></button>
          <button @click="activeTab = 'tweets'" class="tab-btn pb-3 text-sm font-semibold whitespace-nowrap" :class="activeTab === 'tweets' ? 'active text-white' : 'text-gray-500 hover:text-gray-300'" :disabled="!selectedCampaignId"><span class="flex items-center gap-2"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg> التغريدات <span class="text-xs px-1.5 py-0.5 rounded-full" :class="activeTab === 'tweets' ? 'bg-yemen-green/20 text-yemen-greenLight' : 'bg-gray-700/30 text-gray-500'" x-text="currentTweets.length"></span></span></button>
          <button x-show="isMainAdmin" @click="activeTab = 'subadmins'" class="tab-btn pb-3 text-sm font-semibold whitespace-nowrap" :class="activeTab === 'subadmins' ? 'active text-white' : 'text-gray-500 hover:text-gray-300'"><span class="flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg> المشرفون</span></button>
          <button x-show="isMainAdmin" @click="activeTab = 'invites'" class="tab-btn pb-3 text-sm font-semibold whitespace-nowrap" :class="activeTab === 'invites' ? 'active text-white' : 'text-gray-500 hover:text-gray-300'"><span class="flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg> روابط الدعوة</span></button>
          <button x-show="isMainAdmin" @click="activeTab = 'analytics'" class="tab-btn pb-3 text-sm font-semibold whitespace-nowrap" :class="activeTab === 'analytics' ? 'active text-white' : 'text-gray-500 hover:text-gray-300'"><span class="flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg> الإحصائيات</span></button>
          <button x-show="isMainAdmin" @click="activeTab = 'reports'" class="tab-btn pb-3 text-sm font-semibold whitespace-nowrap" :class="activeTab === 'reports' ? 'active text-white' : 'text-gray-500 hover:text-gray-300'"><span class="flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg> التقارير</span></button>
        </div>

        <!-- CAMPAIGNS TAB -->
        <div x-show="activeTab === 'campaigns'" x-transition:enter="animate-fade-in">
          <div class="flex items-center justify-between mb-6">
            <div><h2 class="text-xl md:text-2xl font-black mb-1">إدارة الحملات</h2><p class="text-sm text-gray-400">إنشاء، تعديل، وحذف الحملات</p></div>
            <button x-show="canCreateCampaign()" @click="openCampaignForm()" class="bg-yemen-green hover:bg-yemen-greenLight text-white font-bold px-4 py-2.5 rounded-xl transition-all flex items-center gap-2 text-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> حملة جديدة</button>
          </div>
          <div x-show="showCampaignForm" class="glass-card rounded-xl p-5 md:p-6 mb-6 animate-scale-in">
            <h3 class="text-sm font-bold mb-4" :class="isLightMode ? 'text-gray-900' : 'text-white'"><span x-text="editingCampaignId ? 'تعديل الحملة' : 'إنشاء حملة جديدة'"></span></h3>
            <form @submit.prevent="saveCampaign()" class="space-y-4">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-xs font-bold mb-1" :class="isLightMode ? 'text-gray-900' : 'text-white'">اسم الحملة <span class="text-yemen-red">*</span></label><input type="text" x-model="campaignForm.name" class="glass-input w-full px-4 py-3 rounded-xl text-sm" placeholder="اسم الحملة" dir="rtl" required></div>
                <div><label class="block text-xs font-bold mb-1" :class="isLightMode ? 'text-gray-900' : 'text-white'">رابط الفيديو <span class="text-gray-500 font-normal">(اختياري)</span></label><input type="url" x-model="campaignForm.videoUrl" class="glass-input w-full px-4 py-3 rounded-xl text-sm" placeholder="https://..." dir="ltr"></div>
                <div>
                  <label class="block text-xs font-bold mb-1" :class="isLightMode ? 'text-gray-900' : 'text-white'">هاشتاق الحملة <span class="text-gray-500 font-normal">(اختياري)</span></label>
                  <input type="text" x-model="campaignForm.hashtag" class="glass-input w-full px-4 py-3 rounded-xl text-sm" placeholder="#اسم_الحملة" dir="rtl">
                </div>
              </div>
              <div><label class="block text-xs font-bold mb-1" :class="isLightMode ? 'text-gray-900' : 'text-white'">مقدمة الحملة <span class="text-gray-500 font-normal">(اختياري)</span></label><textarea x-model="campaignForm.description" rows="3" class="glass-input w-full px-4 py-3 rounded-xl text-sm resize-none" placeholder="اكتب مقدمة عن الحملة..." dir="rtl"></textarea></div>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div><label class="block text-xs font-bold mb-1" :class="isLightMode ? 'text-gray-900' : 'text-white'">تاريخ الإطلاق <span class="text-yemen-red">*</span></label><input type="date" x-model="dateInputs.date" class="glass-input w-full px-4 py-3 rounded-xl text-sm" required></div>
                <div><label class="block text-xs font-bold mb-1" :class="isLightMode ? 'text-gray-900' : 'text-white'">وقت الإطلاق <span class="text-yemen-red">*</span></label><input type="time" x-model="dateInputs.time" class="glass-input w-full px-4 py-3 rounded-xl text-sm" required></div>
                <div><label class="block text-xs font-bold mb-1" :class="isLightMode ? 'text-gray-900' : 'text-white'">تاريخ الانتهاء <span class="text-gray-500 font-normal">(اختياري)</span></label><input type="date" x-model="dateInputs.endDate" class="glass-input w-full px-4 py-3 rounded-xl text-sm"></div>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr :class="isLightMode ? 'bg-gray-50' : 'bg-white/5'"><th class="text-right px-3 py-2 text-xs font-semibold text-gray-400">الحملة</th><th class="text-right px-3 py-2 text-xs font-semibold text-gray-400">المشاهدات</th><th class="text-right px-3 py-2 text-xs font-semibold text-gray-400">المشاركات</th><th class="text-right px-3 py-2 text-xs font-semibold text-gray-400">X</th><th class="text-right px-3 py-2 text-xs font-semibold text-gray-400">واتساب</th><th class="text-right px-3 py-2 text-xs font-semibold text-gray-400">فيسبوك</th><th class="text-right px-3 py-2 text-xs font-semibold text-gray-400">النسخ</th><th class="text-right px-3 py-2 text-xs font-semibold text-gray-400">الزوار</th></tr></thead><tbody><template x-for="(stats, cid) in analyticsSummary.byCampaign" :key="cid"><tr class="border-t" :class="isLightMode ? 'border-gray-100' : 'border-white/5'"><td class="px-3 py-2 font-semibold" :class="isLightMode ? 'text-gray-700' : 'text-gray-200'" x-text="getCampaignName(cid)"></td><td class="px-3 py-2 text-gray-500" x-text="stats.campaignViews"></td><td class="px-3 py-2 text-gray-500" x-text="stats.shareClicks"></td><td class="px-3 py-2 text-gray-500" x-text="(stats.sharesByPlatform && stats.sharesByPlatform.x) || 0"></td><td class="px-3 py-2 text-gray-500" x-text="(stats.sharesByPlatform && stats.sharesByPlatform.whatsapp) || 0"></td><td class="px-3 py-2 text-gray-500" x-text="(stats.sharesByPlatform && stats.sharesByPlatform.facebook) || 0"></td><td class="px-3 py-2 text-gray-500" x-text="stats.copies"></td><td class="px-3 py-2 text-gray-500" x-text="stats.uniqueVisitors"></td></tr></template></tbody></table></div>

          <div x-show="!analyticsSummary || Object.keys(analyticsSummary.byCampaign || {}).length === 0" class="glass-card rounded-xl p-10 text-center"><svg class="w-12 h-12 text-gray-600 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg><p class="text-gray-400 text-sm">لا توجد بيانات تحليلية بعد</p></div>

              <div class="flex gap-3">
                <button @click="generateReport('html')" :disabled="!reportCampaignId || reportLoading" class="flex-1 bg-yemen-green hover:bg-yemen-greenLight disabled:opacity-50 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2"><template x-if="reportLoading"><svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg></template><svg x-show="!reportLoading" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><span x-text="reportLoading ? 'جاري...' : 'عرض التقرير'"></span></button>
                <button @click="generateReport('pdf')" :disabled="!reportCampaignId || reportLoading" class="flex-1 glass hover:bg-white/10 disabled:opacity-50 font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><span>تحميل HTML</span></button>

            <div class="p-4 border-b border-white/5 flex items-center justify-between"><h3 class="text-sm font-bold" :class="isLightMode ? 'text-gray-900' : 'text-white'">معاينة التقرير</h3><button @click="reportHtml = null" class="text-xs text-gray-400 hover:text-yemen-red transition-colors">إغلاق</button></div>

          نظام إدارة الحملات v4.0 | جلسات آمنة | تتبع Analytics | تقارير PDF
        </span>

  </template>

  <script>
    function adminApp() {
      return {
        isAuthenticated: false, token: localStorage.getItem('adminToken'), showPassword: false,
        loginLoading: false, loginError: null, shakeError: false, loginForm: { username: '', password: '' },
        userInfo: {}, isMainAdmin: false, isLightMode: false, activeTab: 'campaigns',
        successMessage: null, saveError: null, saveLoading: false,
        campaigns: [], showCampaignForm: false, editingCampaignId: null,
        campaignForm: { name: '', videoUrl: '', description: '', hashtag: '', targetTimezone: 'Asia/Riyadh', timezoneLabel: 'توقيت مكة المكرمة (GMT+3)', isActive: true },
        dateInputs: { date: '', time: '', endDate: '' }, confirmDeleteCampaign: null, deleteCampaignLoading: null,
        selectedCampaignId: null, selectedCampaignName: '', currentTweets: [],
        newTweetText: '', newTweetMediaUrl: '', editingTweetId: null,
        tweetLoading: false, tweetValidationError: null, confirmDeleteTweet: null,
        deleteLoading: null, refreshLoading: false, excelDragOver: false,
        excelPreviewData: [], excelImportLoading: false,
        subAdmins: [], showSubAdminForm: false, editingSubAdminId: null,
        subAdminForm: { name: '', username: '', password: '', permissions: { canAddTweets: true, canEditTweets: true, canDeleteTweets: false, canImportExcel: true, canViewReports: false } },
        inviteLinks: [], showInviteForm: false, inviteForm: { campaignId: '', name: '' },
        analyticsSummary: null, analyticsLoading: false,
        reportCampaignId: '', reportLoading: false, reportHtml: null,

        async checkSession() {
          if (!this.token) { this.isAuthenticated = false; return; }
          try {
            const res = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + this.token } });
            const data = await res.json();
            if (data.success) {
              this.isAuthenticated = true; this.userInfo = data.user;
              this.isMainAdmin = data.user.adminType === 'main';
              await this.loadCampaigns();
              if (this.isMainAdmin) { await this.loadSubAdmins(); await this.loadInviteLinks(); await this.loadAnalytics(); }
            } else { this.logout(); }
          } catch (e) { this.logout(); }
        },

        async handleLogin() {
          this.loginLoading = true; this.loginError = null;
          try {
            const res = await fetch('/api/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.loginForm) });
            const data = await res.json();
            if (data.success) {
              this.token = data.token; localStorage.setItem('adminToken', data.token);
              this.userInfo = { adminType: data.adminType, name: data.name, permissions: data.permissions };
              this.isMainAdmin = data.adminType === 'main'; this.isAuthenticated = true;
              await this.loadCampaigns();
              if (this.isMainAdmin) { await this.loadSubAdmins(); await this.loadInviteLinks(); await this.loadAnalytics(); }
            } else { this.loginError = data.error || 'فشل تسجيل الدخول'; this.shakeError = true; setTimeout(() => this.shakeError = false, 500); }
          } catch (e) { this.loginError = 'تعذر الاتصال بالخادم'; }
          this.loginLoading = false;
        },

        async logout() {
          try { await fetch('/api/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + this.token } }); } catch (e) {}
          this.token = null; localStorage.removeItem('adminToken');
          this.isAuthenticated = false; this.userInfo = {}; this.isMainAdmin = false;
        },

        canCreateCampaign() { return this.isMainAdmin; },
        canEditCampaign() { return this.isMainAdmin; },
        canDeleteCampaign() { return this.isMainAdmin; },
        canAddTweets() { return this.isMainAdmin || (this.userInfo.permissions?.canAddTweets); },
        canEditTweets() { return this.isMainAdmin || (this.userInfo.permissions?.canEditTweets); },
        canDeleteTweets() { return this.isMainAdmin || (this.userInfo.permissions?.canDeleteTweets); },
        canImportExcel() { return this.isMainAdmin || (this.userInfo.permissions?.canImportExcel); },

        async loadCampaigns() {
          try {
            const res = await fetch('/api/campaign', { headers: this.token ? { 'Authorization': 'Bearer ' + this.token } : {} });
            const data = await res.json();
            if (data.success) this.campaigns = data.campaigns || [];
          } catch (e) {}
        },

        openCampaignForm() { this.editingCampaignId = null; this.campaignForm = { name: '', videoUrl: '', description: '', hashtag: '', targetTimezone: 'Asia/Riyadh', timezoneLabel: 'توقيت مكة المكرمة (GMT+3)', isActive: true }; this.dateInputs = { date: '', time: '', endDate: '' }; this.showCampaignForm = true; },
        cancelCampaignForm() { this.showCampaignForm = false; },

        editCampaign(campaign) {
          this.editingCampaignId = campaign.id;
          this.campaignForm = { name: campaign.campaignName, videoUrl: campaign.videoUrl || '', description: campaign.description || '', hashtag: campaign.hashtag || '', targetTimezone: campaign.targetTimezone || 'Asia/Riyadh', timezoneLabel: campaign.timezoneLabel || 'توقيت مكة المكرمة (GMT+3)', isActive: campaign.isActive };
          if (campaign.targetTime) { const d = new Date(campaign.targetTime); this.dateInputs.date = d.toISOString().split('T')[0]; this.dateInputs.time = d.toTimeString().slice(0, 5); }
          if (campaign.endTime) { this.dateInputs.endDate = new Date(campaign.endTime).toISOString().split('T')[0]; }
          this.showCampaignForm = true;
        },

        async saveCampaign() {
          this.saveLoading = true;
          try {
            const targetTime = this.dateInputs.date && this.dateInputs.time ? new Date(this.dateInputs.date + 'T' + this.dateInputs.time + ':00').toISOString() : null;
            const endTime = this.dateInputs.endDate ? new Date(this.dateInputs.endDate + 'T23:59:59').toISOString() : null;
            const res = await fetch('/api/update', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token }, body: JSON.stringify({ type: 'campaign', campaignId: this.editingCampaignId, campaignName: this.campaignForm.name, videoUrl: this.campaignForm.videoUrl, description: this.campaignForm.description, hashtag: this.campaignForm.hashtag, targetTime, endTime, targetTimezone: this.campaignForm.targetTimezone, timezoneLabel: this.campaignForm.timezoneLabel, isActive: this.campaignForm.isActive }) });
            const data = await res.json();
            if (data.success) { this.showCampaignForm = false; this.successMessage = data.message; setTimeout(() => this.successMessage = null, 3000); await this.loadCampaigns(); }
            else { this.saveError = data.error; setTimeout(() => this.saveError = null, 5000); }
          } catch (e) { this.saveError = 'حدث خطأ'; }
          this.saveLoading = false;
        },

        async deleteCampaign(id) {
          this.deleteCampaignLoading = id;
          try {
            const res = await fetch('/api/delete-campaign', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token }, body: JSON.stringify({ id }) });
            const data = await res.json();
            if (data.success) { this.confirmDeleteCampaign = null; this.successMessage = 'تم حذف الحملة'; setTimeout(() => this.successMessage = null, 3000); await this.loadCampaigns(); }
          } catch (e) { this.saveError = 'حدث خطأ'; }
          this.deleteCampaignLoading = null;
        },

        async selectCampaign(id) { this.selectedCampaignId = id; const c = this.campaigns.find(c => c.id === id); this.selectedCampaignName = c ? c.campaignName : ''; await this.loadCampaignTweets(id); },

        async loadCampaignTweets(id) {
          this.refreshLoading = true;
          try { const res = await fetch('/api/campaign?id=' + id, { headers: this.token ? { 'Authorization': 'Bearer ' + this.token } : {} }); const data = await res.json(); if (data.success) this.currentTweets = data.tweets || []; }
          catch (e) {}
          this.refreshLoading = false;
        },

        async addOrUpdateTweet() {
          if (!this.newTweetText.trim()) { this.tweetValidationError = 'نص التغريدة مطلوب'; return; }
          if (this.newTweetText.length > 280) { this.tweetValidationError = 'النص يتجاوز 280 حرفاً'; return; }
          this.tweetValidationError = null; this.tweetLoading = true;
          try {
            const payload = { type: 'tweet', campaignId: this.selectedCampaignId, tweetText: this.newTweetText, mediaUrl: this.newTweetMediaUrl };
            if (this.editingTweetId) payload.tweetId = this.editingTweetId;
            const res = await fetch('/api/update', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token }, body: JSON.stringify(payload) });
            const data = await res.json();
            if (data.success) { this.newTweetText = ''; this.newTweetMediaUrl = ''; this.editingTweetId = null; this.successMessage = data.message; setTimeout(() => this.successMessage = null, 3000); await this.loadCampaignTweets(this.selectedCampaignId); }
            else { this.saveError = data.error; }
          } catch (e) { this.saveError = 'حدث خطأ'; }
          this.tweetLoading = false;
        },

        editTweet(tweet) { this.editingTweetId = tweet.id; this.newTweetText = tweet.text || ''; this.newTweetMediaUrl = tweet.media_url || ''; },
        cancelEditTweet() { this.editingTweetId = null; this.newTweetText = ''; this.newTweetMediaUrl = ''; this.tweetValidationError = null; },

        async deleteTweet(id) {
          this.deleteLoading = id;
          try { const res = await fetch('/api/delete-tweet', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token }, body: JSON.stringify({ id }) }); if (res.ok) { this.confirmDeleteTweet = null; await this.loadCampaignTweets(this.selectedCampaignId); } }
          catch (e) {}
          this.deleteLoading = null;
        },

        isVideoMedia(url) { if (!url) return false; const exts = ['.mp4', '.webm', '.ogg', '.mov', '.m4v']; return exts.some(e => url.toLowerCase().includes(e)) || url.toLowerCase().includes('video'); },

        handleExcelDrop(e) { this.excelDragOver = false; const files = e.dataTransfer.files; if (files.length) this.parseExcelFile(files[0]); },
        handleExcelSelect(e) { const files = e.target.files; if (files.length) this.parseExcelFile(files[0]); },
        parseExcelFile(file) {
          const reader = new FileReader();
          reader.onload = (e) => { try { const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, { type: 'array' }); const sheet = workbook.Sheets[workbook.SheetNames[0]]; const json = XLSX.utils.sheet_to_json(sheet, { header: 1 }); const rows = json.slice(1); this.excelPreviewData = rows.map(row => ({ title: row[0] || '', text: row[1] || '', media_url: row[2] || '' })).filter(r => r.text); } catch (err) { this.saveError = 'خطأ في قراءة الملف'; } };
          reader.readAsArrayBuffer(file);
        },
        async importExcelTweets() {
          this.excelImportLoading = true;
          try {
            const res = await fetch('/api/update', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token }, body: JSON.stringify({ type: 'excel_import', excelImport: true, campaignId: this.selectedCampaignId, tweets: this.excelPreviewData }) });
            const data = await res.json();
            if (data.success) { this.excelPreviewData = []; this.successMessage = 'تم استيراد ' + (data.count || 0) + ' تغريدة'; setTimeout(() => this.successMessage = null, 3000); await this.loadCampaignTweets(this.selectedCampaignId); }
            else { this.saveError = data.error; }
          } catch (e) { this.saveError = 'حدث خطأ'; }
          this.excelImportLoading = false;
        },
        copyExcelGuide() { navigator.clipboard.writeText('عمود 1: العنوان (اختياري)\nعمود 2: نص التغريدة (مطلوب)\nعمود 3: رابط الوسائط (اختياري)').then(() => { this.successMessage = 'تم النسخ!'; setTimeout(() => this.successMessage = null, 2000); }); },

        async loadSubAdmins() { try { const res = await fetch('/api/sub-admins', { headers: { 'Authorization': 'Bearer ' + this.token } }); const data = await res.json(); if (data.success) this.subAdmins = data.subAdmins || []; } catch (e) {} },

        editSubAdmin(sa) { this.editingSubAdminId = sa.id; this.subAdminForm = { name: sa.name, username: sa.username, password: '', permissions: sa.permissions || { canAddTweets: true, canEditTweets: true, canDeleteTweets: false, canImportExcel: true, canViewReports: false } }; this.showSubAdminForm = true; },

        async saveSubAdmin() {
          this.saveLoading = true;
          try {
            const payload = { id: this.editingSubAdminId, name: this.subAdminForm.name, username: this.subAdminForm.username, permissions: this.subAdminForm.permissions };
            if (this.subAdminForm.password) payload.password = this.subAdminForm.password;
            if (!this.editingSubAdminId) delete payload.id;
            const res = await fetch('/api/sub-admins', { method: this.editingSubAdminId ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token }, body: JSON.stringify(payload) });
            const data = await res.json();
            if (data.success) { this.showSubAdminForm = false; this.successMessage = this.editingSubAdminId ? 'تم التحديث' : 'تمت الإضافة'; setTimeout(() => this.successMessage = null, 3000); await this.loadSubAdmins(); }
            else { this.saveError = data.error; }
          } catch (e) { this.saveError = 'حدث خطأ'; }
          this.saveLoading = false;
        },

        async toggleSubAdmin(id, currentStatus) {
          try { const res = await fetch('/api/sub-admins', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token }, body: JSON.stringify({ id, isActive: !currentStatus }) }); if (res.ok) { this.successMessage = currentStatus ? 'تم التعطيل' : 'تم التفعيل'; setTimeout(() => this.successMessage = null, 3000); await this.loadSubAdmins(); } } catch (e) {}
        },

        async loadInviteLinks() { try { const res = await fetch('/api/invite-links', { headers: { 'Authorization': 'Bearer ' + this.token } }); const data = await res.json(); if (data.success) this.inviteLinks = data.inviteLinks || []; } catch (e) {} },

        async saveInviteLink() {
          this.saveLoading = true;
          try {
            const res = await fetch('/api/invite-links', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token }, body: JSON.stringify({ campaignId: this.inviteForm.campaignId, name: this.inviteForm.name }) });
            const data = await res.json();
            if (data.success) { this.showInviteForm = false; this.successMessage = 'تم إنشاء الرابط'; setTimeout(() => this.successMessage = null, 3000); await this.loadInviteLinks(); }
            else { this.saveError = data.error; }
          } catch (e) { this.saveError = 'حدث خطأ'; }
          this.saveLoading = false;
        },

        async toggleInviteLink(id, currentStatus) {
          try { const res = await fetch('/api/invite-links', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token }, body: JSON.stringify({ id, isActive: !currentStatus }) }); if (res.ok) { this.successMessage = currentStatus ? 'تم التعطيل' : 'تم التفعيل'; setTimeout(() => this.successMessage = null, 3000); await this.loadInviteLinks(); } } catch (e) {}
        },

        getInviteUrl(link) { return window.location.origin + '/?campaign=' + link.campaign_id + '&invite=' + link.code; },
        getCampaignName(id) { const c = this.campaigns.find(c => String(c.id) === String(id)); return c ? c.campaignName : 'حملة #' + id; },

        async loadAnalytics() { this.analyticsLoading = true; try { const res = await fetch('/api/analytics', { headers: { 'Authorization': 'Bearer ' + this.token } }); const data = await res.json(); if (data.success) this.analyticsSummary = data.summary; } catch (e) {} this.analyticsLoading = false; },

        async generateReport(format) {
          this.reportLoading = true;
          try {
            const res = await fetch('/api/report?campaignId=' + this.reportCampaignId + '&format=' + format, { headers: { 'Authorization': 'Bearer ' + this.token } });
            if (format === 'html') { const html = await res.text(); this.reportHtml = html; }
            else { const blob = await res.blob(); const url = window.URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'report-' + this.reportCampaignId + '.html'; a.click(); window.URL.revokeObjectURL(url); }
          } catch (e) { this.saveError = 'حدث خطأ'; }
          this.reportLoading = false;
        },

        copyToClipboard(text) { navigator.clipboard.writeText(text).then(() => { this.successMessage = 'تم النسخ!'; setTimeout(() => this.successMessage = null, 2000); }); },

        formatDate(isoString) { if (!isoString) return ''; try { return new Date(isoString).toLocaleString('ar-SA', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); } catch { return isoString; } }
      }
    }
  </script>
</body>
