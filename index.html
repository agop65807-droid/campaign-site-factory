              </div>
            </template>

            <!-- Footer -->
            <div class="mt-8 text-center">
              <div class="flex items-center justify-center gap-4 mb-4">
                <div class="h-px flex-1 max-w-[100px]" :class="isLightMode ? 'bg-gradient-to-l from-transparent to-gray-300' : 'bg-gradient-to-l from-transparent to-white/20'"></div>
                <img :src="siteLogo" alt="" class="w-10 h-10 rounded-full opacity-60" onerror="this.style.display='none'">
                <div class="h-px flex-1 max-w-[100px]" :class="isLightMode ? 'bg-gradient-to-r from-transparent to-gray-300' : 'bg-gradient-to-r from-transparent to-white/20'"></div>
              </div>
              <p class="text-xs" :class="isLightMode ? 'text-gray-400' : 'text-gray-600'" x-text="siteName + ' © 2026'"></p>
              <div class="flex items-center justify-center gap-2 mt-2">
                <span class="security-badge" :class="isLightMode ? 'text-gray-400' : 'text-gray-700'">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                  </svg>
                  اتصال آمن ومشفر
                </span>
              </div>
            </div>

          </div>
        </div>
      </main>
    </div>
  </template>

  <!-- Application Logic -->
  <script>
    function campaignApp() {
      return {
        loading: true,
        error: null,
        campaigns: [],
        selectedCampaign: null,
        tweets: [],
        selectedTweet: null,
        showShareModal: false,
        serverTime: null,
        timeLeft: { days: 0, hours: 0, minutes: 0, seconds: 0 },
        isLive: false,
        transitioning: false,
        progressPercent: 0,
        timerInterval: null,
        serverOffset: 0,
        isLightMode: false,
        sharedTweets: [],
        copiedText: false,
        showInstructions: false,
        notificationEnabled: false,
        notificationPermission: 'default',
        notificationTimer: null,
        notifiedOneMinute: false,
        visitorId: null,
        inviteCode: null,
        // NEW: multi-platform & pro features
        lastSharePlatform: null,
        imageSaved: false,
        searchQuery: '',
        sortBy: 'newest', // newest | longest | shortest
        showQrModal: false,
        qrInstance: null,
        linkCopied: false,
        campaignLink: '',
        toast: { show: false, message: '', type: 'success' },
        // Dynamic site config
        siteName: 'السعودية سبب الفتن',
        siteHashtag: '',
        siteLogo: '/logo-dark.png',
        enabledPlatforms: ['x', 'whatsapp', 'facebook', 'telegram'],

        init() {
          // Load dynamic site config
          this.loadSiteConfig();

          // Generate visitor ID for analytics
          this.visitorId = this.getOrCreateVisitorId();

          // Check URL params for campaign and invite
          const urlParams = new URLSearchParams(window.location.search);
          const campaignId = urlParams.get('campaign');
          this.inviteCode = urlParams.get('invite');

          // Track invite visit
          if (this.inviteCode) {
            this.trackEvent('invite_visit', null, this.inviteCode);
          }

          // Theme setup
          const savedTheme = localStorage.getItem('theme');
          if (savedTheme === 'light') { this.isLightMode = true; document.documentElement.classList.add('light'); }
          else if (savedTheme === 'dark') { this.isLightMode = false; }
          else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) { this.isLightMode = true; document.documentElement.classList.add('light'); }

          // Load shared tweets
          try {
            const saved = localStorage.getItem('sharedTweets');
            if (saved) this.sharedTweets = JSON.parse(saved);
          } catch (e) { this.sharedTweets = []; }

          // Load campaigns
          this.loadCampaigns(campaignId);

          // Track page view
          this.trackEvent('page_view', null, this.inviteCode);
        },

        loadSiteConfig() {
          var cfg = window.__SITE_CONFIG__;
          if (!cfg) return;
          // Apply dynamic branding
          if (cfg.orgName) {
            this.siteName = cfg.orgName;
            document.title = cfg.metaTitle || cfg.orgName;
            var metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', cfg.metaDescription || cfg.orgName + ' - الحملة الإلكترونية الموحدة');
            var ogTitle = document.querySelector('meta[property="og:title"]');
            if (ogTitle) ogTitle.setAttribute('content', cfg.orgName);
            var ogSiteName = document.querySelector('meta[property="og:site_name"]');
            if (ogSiteName) ogSiteName.setAttribute('content', cfg.orgName);
            var twitterTitle = document.querySelector('meta[name="twitter:title"]');
            if (twitterTitle) twitterTitle.setAttribute('content', cfg.orgName);
          }
          if (cfg.hashtag) this.siteHashtag = cfg.hashtag;
          if (cfg.logoUrl) this.siteLogo = cfg.logoUrl;
          // Apply dynamic colors to CSS variables
          var root = document.documentElement;
          function hexToRgb(hex) {
            hex = hex.replace('#', '');
            if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
            var r = parseInt(hex.substring(0,2),16);
            var g = parseInt(hex.substring(2,4),16);
            var b = parseInt(hex.substring(4,6),16);
            return r+', '+g+', '+b;
          }
          if (cfg.primaryColor) {
            root.style.setProperty('--primary-color', cfg.primaryColor);
            root.style.setProperty('--pc-rgb', hexToRgb(cfg.primaryColor));
            root.style.setProperty('--primary-dark', cfg.primaryColor + 'cc');
            root.style.setProperty('--scrollbar-thumb', cfg.primaryColor);
          }
          if (cfg.secondaryColor) {
            root.style.setProperty('--secondary-color', cfg.secondaryColor);
            root.style.setProperty('--sc-rgb', hexToRgb(cfg.secondaryColor));
          }
          // Apply theme mode
          if (cfg.themeMode === 'light' && !localStorage.getItem('theme')) {
            this.isLightMode = true;
            document.documentElement.classList.add('light');
          }
          // Store enabled platforms
          if (cfg.enabledSharePlatforms && Array.isArray(cfg.enabledSharePlatforms)) {
            this.enabledPlatforms = cfg.enabledSharePlatforms;
          }
        },

        getOrCreateVisitorId() {
          let vid = localStorage.getItem('visitor_id');
          if (!vid) {
            vid = 'v_' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('visitor_id', vid);
          }
          return vid;
        },

        async trackEvent(eventType, campaignId, inviteCode) {
          try {
            await fetch('/api/analytics', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                eventType,
                campaignId: campaignId || (this.selectedCampaign ? this.selectedCampaign.id : null),
                inviteCode: inviteCode || this.inviteCode,
                visitorId: this.visitorId,
                metadata: { url: window.location.href, referrer: document.referrer }
              })
            });
          } catch (e) { /* silent fail */ }
        },

        async loadCampaigns(autoSelectId) {
          this.loading = true; this.error = null;
          try {
            const response = await fetch('/api/campaign');
            if (!response.ok) throw new Error('Server returned ' + response.status);
            const data = await response.json();
            if (!data.success) throw new Error(data.error || 'Failed to load');
            this.campaigns = data.campaigns || [];
            this.serverTime = new Date(data.serverTime);
            this.serverOffset = this.serverTime - new Date();
            this.loading = false;

            // Auto-select campaign from URL
            if (autoSelectId && this.campaigns.length > 0) {
              const campaign = this.campaigns.find(c => String(c.id) === String(autoSelectId));
              if (campaign) {
                this.selectCampaign(campaign);
              }
            }
          } catch (err) {
            this.loading = false;
            this.error = 'تعذر الاتصال بالخادم. يرجى التحقق من اتصال الإنترنت والمحاولة مرة أخرى.';
            console.error('Init error:', err);
          }
        },

        async selectCampaign(campaign) {
          this.selectedCampaign = campaign;
          this.loading = true;
          document.title = campaign.campaignName;

          // Update URL without reload
          const url = new URL(window.location);
          url.searchParams.set('campaign', campaign.id);
          window.history.pushState({}, '', url);

          try {
            const response = await fetch('/api/campaign?id=' + campaign.id);
            const data = await response.json();
            if (data.success) {
              this.tweets = data.tweets || [];
              this.selectedCampaign = data.campaign;
              this.loading = false;
              this.startCountdown();

              // Track campaign view
              this.trackEvent('campaign_view', campaign.id, this.inviteCode);
            } else { throw new Error(data.error); }
          } catch (err) {
            this.loading = false;
            this.error = 'تعذر تحميل تفاصيل الحملة';
          }
        },

        backToCampaigns() {
          this.selectedCampaign = null;
          this.isLive = false;
          this.transitioning = false;
          if (this.timerInterval) clearInterval(this.timerInterval);
          document.title = this.siteName;

          // Update URL
          const url = new URL(window.location);
          url.searchParams.delete('campaign');
          window.history.pushState({}, '', url);
        },

        toggleTheme() {
          this.isLightMode = !this.isLightMode;
          if (this.isLightMode) { document.documentElement.classList.add('light'); localStorage.setItem('theme', 'light'); }
          else { document.documentElement.classList.remove('light'); localStorage.setItem('theme', 'dark'); }
        },

        startCountdown() {
          this.updateCountdown();
          this.timerInterval = setInterval(() => { this.updateCountdown(); }, 1000);
        },

        updateCountdown() {
          if (!this.selectedCampaign) return;
          const now = new Date(Date.now() + this.serverOffset);
          const target = new Date(this.selectedCampaign.targetTime);
          const diff = target - now;
          if (diff <= 0) {
            this.timeLeft = { days: 0, hours: 0, minutes: 0, seconds: 0 };
            this.progressPercent = 100;
            if (!this.isLive && !this.transitioning) this.transitionToLive();
            return;
          }
          const days = Math.floor(diff / (1000 * 60 * 60 * 24));
          const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((diff % (1000 * 60)) / 1000);
          this.timeLeft = { days, hours, minutes, seconds };
          const totalDuration = 30 * 24 * 60 * 60 * 1000;
          const elapsed = totalDuration - Math.min(diff, totalDuration);
          this.progressPercent = Math.max(0, Math.min(100, (elapsed / totalDuration) * 100));
        },

        transitionToLive() {
          this.transitioning = true;
          setTimeout(() => { this.isLive = true; this.transitioning = false; if (this.timerInterval) clearInterval(this.timerInterval); }, 600);
        },

        isShared(tweetId) { return this.sharedTweets.includes(String(tweetId)); },
        markAsShared(tweetId, platform) {
          const id = String(tweetId);
          if (!this.sharedTweets.includes(id)) {
            this.sharedTweets.push(id);
            localStorage.setItem('sharedTweets', JSON.stringify(this.sharedTweets));
            this.showToast('تم تسجيل مشاركتك! شكراً لدعمك', 'success');
          }
          // Track share click with platform
          const eventType = platform ? ('tweet_share_' + platform) : 'tweet_share_click';
          this.trackEvent(eventType, this.selectedCampaign ? this.selectedCampaign.id : null, this.inviteCode);
          // Track generic too (for backward compat)
          this.trackEvent('tweet_share_click', this.selectedCampaign ? this.selectedCampaign.id : null, this.inviteCode);
        },
        getParticipationCount() { return this.sharedTweets.length; }
        ,
        getParticipationPercent() {
          if (!this.tweets || this.tweets.length === 0) return 0;
          return Math.min(100, Math.round((this.sharedTweets.length / this.filteredTweets.length) * 100));
        },
        get filteredTweets() {
          if (!this.tweets) return [];
          let list = [...this.tweets];
          if (this.searchQuery && this.searchQuery.trim()) {
            const q = this.searchQuery.trim().toLowerCase();
            list = list.filter(t => (t.text || '').toLowerCase().includes(q));
          }
          if (this.sortBy === 'longest') list.sort((a, b) => (b.text || '').length - (a.text || '').length);
          else if (this.sortBy === 'shortest') list.sort((a, b) => (a.text || '').length - (b.text || '').length);
          else list.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
          return list;
        },

        openShareModal(tweet) {
          this.selectedTweet = tweet;
          this.showShareModal = true;
          this.copiedText = false;
          this.imageSaved = false;
          this.lastSharePlatform = null;
          document.body.style.overflow = 'hidden';
        },
        closeShareModal() { this.showShareModal = false; this.selectedTweet = null; document.body.style.overflow = ''; this.lastSharePlatform = null; },

        confirmShare(platform) {
          if (platform) {
            this.lastSharePlatform = platform;
            this.markAsShared(this.selectedTweet?.id, platform);
            if (platform === 'facebook' || platform === 'whatsapp' || platform === 'telegram') {
              // نسخ النص تلقائياً
              this.copyTweetText(this.getSharePreviewText(this.selectedTweet), true);
            }
          } else {
            this.markAsShared(this.selectedTweet?.id, 'x');
          }
        },

        isVideoMedia(url) {
          if (!url) return false;
          const exts = ['.mp4', '.webm', '.ogg', '.mov', '.m4v'];
          const lower = url.toLowerCase();
          return exts.some(e => lower.includes(e)) || lower.includes('video') || lower.includes('stream');
        },

        getShareUrl(tweet) {
          if (!tweet) return '#';
          let text = tweet.text || '';
          const hashtag = (this.selectedCampaign && this.selectedCampaign.hashtag) || this.siteHashtag;
          if (hashtag) {
            text += '\n' + hashtag;
          }
          if (tweet.media_url) {
            text += '\n' + tweet.media_url + '/video/1';
          }
          return 'https://x.com/intent/tweet?text=' + encodeURIComponent(text)
            .replace(/[!'()*]/g, (c) => '%' + c.charCodeAt(0).toString(16).toUpperCase())
            .replace(/%20/g, '+');
        },

        getSharePreviewText(tweet) {
          if (!tweet) return '';
          let text = tweet.text || '';
          const hashtag = (this.selectedCampaign && this.selectedCampaign.hashtag) || this.siteHashtag;
          if (hashtag) {
            text += '\n' + hashtag;
          }
          if (tweet.media_url) {
            text += '\n' + tweet.media_url + '/video/1';
          }
          return text;
        },

        // ===== WhatsApp =====
        getWhatsAppUrl(tweet) {
          if (!tweet) return '#';
          let text = this.getSharePreviewText(tweet);
          // أضف رابط الحملة إن وُجد
          const link = this.getCampaignShareLink();
          if (link) text += '\n\nشارك الحملة: ' + link;
          const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
          const base = isMobile ? 'https://wa.me/?text=' : 'https://web.whatsapp.com/send?text=';
          return base + encodeURIComponent(text);
        },

        // ===== Telegram =====
        getTelegramUrl(tweet) {
          if (!tweet) return '#';
          const text = this.getSharePreviewText(tweet);
          const link = this.getCampaignShareLink();
          const url = link || window.location.href;
          return 'https://t.me/share/url?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(text);
        },

        // ===== Facebook (رابط الحملة + نسخ النص تلقائياً) =====
        getFacebookUrl(tweet) {
          if (!tweet) return '#';
          const link = this.getCampaignShareLink() || window.location.href;
          return 'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(link) + '&quote=' + encodeURIComponent(this.getSharePreviewText(tweet));
        },

        // ===== Native Web Share API (mobile) =====
        canNativeShare() {
          return !!(navigator.share && navigator.canShare);
        },
        async nativeShare(tweet) {
          if (!tweet) return;
          if (!navigator.share) {
            this.showToast('متصفحك لا يدعم المشاركة الأصلية', 'error');
            return;
          }
          const text = this.getSharePreviewText(tweet);
          const link = this.getCampaignShareLink();
          const shareData = {
            title: this.selectedCampaign ? this.selectedCampaign.campaignName : 'السعودية سبب الفتن',
            text: text,
          };
          if (link) shareData.url = link;
          try {
            await navigator.share(shareData);
            this.markAsShared(tweet.id, 'native');
            this.showToast('تمت المشاركة بنجاح', 'success');
          } catch (err) {
            if (err.name !== 'AbortError') console.warn('Share failed:', err);
          }
        },

        // ===== Get campaign link =====
        getCampaignShareLink() {
          if (this.inviteCode) {
            const url = new URL(window.location.href);
            url.searchParams.set('invite', this.inviteCode);
            return url.toString();
          }
          if (this.selectedCampaign) {
            const url = new URL(window.location.href);
            url.searchParams.set('campaign', this.selectedCampaign.id);
            return url.toString();
          }
          return window.location.href;
        },

        async copyCampaignLink() {
          const link = this.getCampaignShareLink();
          try {
            await navigator.clipboard.writeText(link);
            this.linkCopied = true;
            this.showToast('تم نسخ رابط الحملة', 'success');
            // Track
            this.trackEvent('tweet_copy', this.selectedCampaign ? this.selectedCampaign.id : null, this.inviteCode);
            setTimeout(() => { this.linkCopied = false; }, 2000);
          } catch (err) {
            this.showToast('تعذّر نسخ الرابط', 'error');
          }
        },

        // ===== QR Code =====
        openQrModal() {
          this.showQrModal = true;
          document.body.style.overflow = 'hidden';
          this.$nextTick(() => { this.generateQr(); });
        },
        closeQrModal() {
          this.showQrModal = false;
          document.body.style.overflow = '';
        },
        generateQr() {
          const qrEl = document.getElementById('qrCodeContainer');
          if (!qrEl || typeof QRCode === 'undefined') return;
          qrEl.innerHTML = '';
          const link = this.getCampaignShareLink();
          this.qrInstance = new QRCode(qrEl, {
            text: link,
            width: 220,
            height: 220,
            colorDark: '#0a0a0a',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H,
          });
        },
        async downloadQr() {
          const img = document.querySelector('#qrCodeContainer img') || document.querySelector('#qrCodeContainer canvas');
          if (!img) return;
          let dataUrl;
          if (img.tagName === 'IMG') dataUrl = img.src;
          else dataUrl = img.toDataURL('image/png');
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = 'campaign-qr.png';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          this.showToast('تم تحميل QR', 'success');
        },

        // ===== Save tweet as image =====
        async saveTweetAsImage(tweet) {
          if (!tweet) return;
          // استخدم مكتبة html2canvas عبر CDN ديناميكياً
          if (typeof html2canvas === 'undefined') {
            await new Promise((resolve, reject) => {
              const s = document.createElement('script');
              s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
              s.onload = resolve;
              s.onerror = reject;
              document.head.appendChild(s);
            }).catch(() => {});
          }
          // إنشاء عنصر مؤقت
          const tmp = document.createElement('div');
          tmp.style.cssText = 'position:fixed;top:-9999px;right:0;width:600px;background:#0a0a0a;color:#fff;padding:24px;border-radius:16px;font-family:Cairo,sans-serif;direction:rtl;border:2px solid #15803d;';
          const link = this.getCampaignShareLink();
          tmp.innerHTML = `
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
              <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#15803d,#16a34a);display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;">'+(this.siteName||'').substring(0,10)+'</div>
              <div>
                <div style="font-weight:800;font-size:15px;">'+this.siteName+'</div>
                <div style="font-size:12px;color:#9ca3af;">@AlMahra_Sit_in</div>
              </div>
            </div>
            <div style="font-size:15px;line-height:1.8;white-space:pre-wrap;word-break:break-word;">${(tweet.text || '').replace(/</g,'<')}</div>
            ${this.selectedCampaign && this.selectedCampaign.hashtag ? `<div style="margin-top:12px;color:#4ade80;font-weight:700;">${this.selectedCampaign.hashtag.replace(/</g,'<')}</div>` : ''}
            <div style="margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.1);font-size:12px;color:#9ca3af;">${link}</div>
          `;
          document.body.appendChild(tmp);
          try {
            if (typeof html2canvas === 'undefined') throw new Error('html2canvas failed');
            const canvas = await html2canvas(tmp, { backgroundColor: '#0a0a0a', scale: 2 });
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = 'tweet-' + tweet.id + '.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            this.imageSaved = true;
            this.trackEvent('tweet_save_image', this.selectedCampaign ? this.selectedCampaign.id : null, this.inviteCode);
            this.showToast('تم حفظ التغريدة كصورة', 'success');
            setTimeout(() => { this.imageSaved = false; }, 2500);
          } catch (err) {
            console.error(err);
            // fallback: نسخ النص
            this.copyTweetText(this.getSharePreviewText(tweet));
            this.showToast('تم نسخ النص (المتصفح لا يدعم الحفظ كصورة)', 'info');
          } finally {
            document.body.removeChild(tmp);
          }
        },

        // ===== Toast =====
        showToast(message, type) {
          this.toast = { show: true, message, type: type || 'success' };
          setTimeout(() => { this.toast.show = false; }, 3000);
        },

        async copyTweetText(text, silent) {
          if (!text) return;
          try { await navigator.clipboard.writeText(text); this.copiedText = true; }
          catch (err) {
            const textarea = document.createElement('textarea'); textarea.value = text;
            document.body.appendChild(textarea); textarea.select(); document.execCommand('copy'); document.body.removeChild(textarea);
            this.copiedText = true;
          }
          // Track copy
          if (!silent) this.trackEvent('tweet_copy', this.selectedCampaign ? this.selectedCampaign.id : null, this.inviteCode);
          if (!silent) this.showToast('تم نسخ النص!', 'success');
          setTimeout(() => { this.copiedText = false; }, 2000);
        },

        formatTargetTime() {
          if (!this.selectedCampaign?.targetTime) return '';
          return new Date(this.selectedCampaign.targetTime).toLocaleString('ar-SA', {
            year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit',
            timeZone: this.selectedCampaign.targetTimezone || 'Asia/Riyadh'
          });
        },

        formatDate(isoString) {
          if (!isoString) return '';
          try { return new Date(isoString).toLocaleString('ar-SA', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }
          catch { return isoString; }
        },

        requestLaunchNotification() {
          if (!('Notification' in window)) {
            alert('المتصفح لا يدعم الإشعارات. يرجى استخدام متصفح حديث (Chrome, Edge, Safari).');
            return;
          }
          Notification.requestPermission().then(permission => {
            this.notificationPermission = permission;
            if (permission === 'granted') {
              this.notificationEnabled = true;
              localStorage.setItem('campaignNotification_' + this.selectedCampaign.id, 'true');
              this.startNotificationCheck();
              setTimeout(() => {
                new Notification('✅ التنبيه مفعّل', {
                  body: 'سنُعلمك فوراً عند انطلاق الحملة',
                  icon: this.siteLogo,
                  tag: 'campaign-confirm-' + this.selectedCampaign.id,
                  requireInteraction: false
                });
              }, 500);
            } else if (permission === 'denied') {
              alert('تم رفض الإذن. يمكنك تفعيل الإشعارات من إعدادات المتصفح ثم المحاولة مرة أخرى.');
            } else {
              alert('لم يتم منح الإذن. يرجى الضغط على "سماح" عند الطلب.');
            }
          });
        },

        startNotificationCheck() {
          if (this.notificationTimer) clearInterval(this.notificationTimer);
          const checkAndNotify = () => {
            if (!this.selectedCampaign || this.isLive) {
              clearInterval(this.notificationTimer);
              localStorage.removeItem('campaignNotification_' + this.selectedCampaign.id);
              return;
            }
            const now = new Date(Date.now() + this.serverOffset);
            const target = new Date(this.selectedCampaign.targetTime);
            const diff = target - now;
            if (diff <= 60000 && diff > 0 && !this.notifiedOneMinute) {
              this.notifiedOneMinute = true;
              new Notification('⏰ الحملة تبدأ خلال دقيقة!', {
                body: 'استعد للمشاركة في "' + this.selectedCampaign.campaignName + '"',
                icon: '/logo-dark.png',
                badge: this.siteLogo,
                tag: 'campaign-1min-' + this.selectedCampaign.id,
                requireInteraction: true
              });
            }
            if (diff <= 0 && !this.isLive) {
              this.isLive = true;
              clearInterval(this.notificationTimer);
              localStorage.removeItem('campaignNotification_' + this.selectedCampaign.id);
              new Notification('🚀 انطلقت الحملة الآن!', {
                body: 'الحملة "' + this.selectedCampaign.campaignName + '" متاحة للمشاركة.',
                icon: '/logo-dark.png',
                badge: this.siteLogo,
                tag: 'campaign-launch-' + this.selectedCampaign.id,
                requireInteraction: true
              });
            }
          };
          checkAndNotify();
          this.notificationTimer = setInterval(checkAndNotify, 5000);
        }
      }
    }
  </script>
</body>
</html>
